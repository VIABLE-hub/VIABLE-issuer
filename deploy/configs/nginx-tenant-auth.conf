# StudentVC Multi-Tenant Access Control
# Nginx configuration for colleague-only access to specific tenants

# Upstream servers for each tenant
upstream studentvc-tub {
    server localhost:8080;
}

upstream studentvc-fub {
    server localhost:8081;
}

upstream studentvc-root {
    server localhost:8082;
}

# Main server block with tenant-specific authentication
server {
    listen 443 ssl http2;
    server_name studentvc.yourdomain.com;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/studentvc.crt;
    ssl_certificate_key /etc/ssl/private/studentvc.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # TU Berlin tenant - Restricted to TUB colleagues
    location /tub {
        auth_basic "TU Berlin StudentVC - Authorized Personnel Only";
        auth_basic_user_file /etc/nginx/auth/.htpasswd_tub;
        
        # Strip /tub prefix and proxy
        rewrite ^/tub(/.*)?$ $1 break;
        proxy_pass http://studentvc-tub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID "tub";
    }

    # FU Berlin tenant - Restricted to FUB colleagues
    location /fub {
        auth_basic "FU Berlin StudentVC - Authorized Personnel Only";
        auth_basic_user_file /etc/nginx/auth/.htpasswd_fub;
        
        # Strip /fub prefix and proxy
        rewrite ^/fub(/.*)?$ $1 break;
        proxy_pass http://studentvc-fub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID "fub";
    }

    # Root tenant - Admin access only
    location /admin {
        auth_basic "StudentVC Admin - System Administrators Only";
        auth_basic_user_file /etc/nginx/auth/.htpasswd_admin;
        
        # Strip /admin prefix and proxy to root
        rewrite ^/admin(/.*)?$ $1 break;
        proxy_pass http://studentvc-root;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-ID "root";
    }

    # Public health check (no auth required)
    location /health {
        auth_basic off;
        proxy_pass http://studentvc-root/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Default location - redirect to appropriate tenant or show selection
    location / {
        auth_basic "StudentVC Platform - Please Login";
        auth_basic_user_file /etc/nginx/auth/.htpasswd_general;
        
        # Show tenant selection page or redirect to root
        proxy_pass http://studentvc-root;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req zone=auth burst=10 nodelay;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name studentvc.yourdomain.com;
    return 301 https://$server_name$request_uri;
} 