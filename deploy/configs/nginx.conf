events {
    worker_connections 1024;
}

http {
    upstream studentvc_tub {
        server studentvc-tub:8080;
    }
    
    upstream studentvc_fub {
        server studentvc-fub:8081;
    }
    
    upstream studentvc_root {
        server studentvc-root:8082;
    }

    # TU Berlin tenant
    server {
        listen 80;
        server_name tub.localhost tub-studentvc.ngrok.io;
        
        location / {
            proxy_pass http://studentvc_tub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # FU Berlin tenant  
    server {
        listen 80;
        server_name fub.localhost fub-studentvc.ngrok.io;
        
        location / {
            proxy_pass http://studentvc_fub;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Root/Default tenant
    server {
        listen 80 default_server;
        server_name localhost root-studentvc.ngrok.io;
        
        location / {
            proxy_pass http://studentvc_root;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
} 