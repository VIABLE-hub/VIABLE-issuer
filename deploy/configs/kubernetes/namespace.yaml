apiVersion: v1
kind: Namespace
metadata:
  name: studentvc
  labels:
    name: studentvc
    app: studentvc-multi-tenant
    version: v2.0.0
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: studentvc-quota
  namespace: studentvc
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "6"
    pods: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: studentvc-limits
  namespace: studentvc
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container 