---
# TU Berlin (TUB) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viable-credentials-tub
  namespace: viable-credentials
  labels:
    app: viable-credentials-tub
    tenant: tub
    university: tu-berlin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: viable-credentials-tub
      tenant: tub
  template:
    metadata:
      labels:
        app: viable-credentials-tub
        tenant: tub
        university: tu-berlin
    spec:
      containers:
      - name: viable-credentials
        image: viable-credentials:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TENANT_ID
          value: "tub"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: SERVER_PORT
          value: "8080"
        - name: USE_HTTPS
          value: "true"
        - name: NGROK_URL
          valueFrom:
            secretKeyRef:
              name: ngrok-secrets
              key: tub-url
        - name: DATABASE_PATH
          value: "/app/data"
        - name: STATIC_PATH
          value: "/app/static"
        - name: PYTHONPATH
          value: "/app"
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: static-storage
          mountPath: /app/static
        - name: tenant-config
          mountPath: /app/tenants/tub
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: tub-data-pvc
      - name: static-storage
        persistentVolumeClaim:
          claimName: tub-static-pvc
      - name: tenant-config
        configMap:
          name: tub-config

