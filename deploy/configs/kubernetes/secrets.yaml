---
# NGROK URLs Secret
apiVersion: v1
kind: Secret
metadata:
  name: ngrok-secrets
  namespace: studentvc
  labels:
    app: studentvc-multi-tenant
type: Opaque
stringData:
  tub-url: "https://tub-berlin-prod.ngrok.io"
  fub-url: "https://fub-berlin-prod.ngrok.io"
  root-url: "https://studentvc-root-prod.ngrok.io"
---
# Database Credentials Secret (if using external DB)
apiVersion: v1
kind: Secret
metadata:
  name: database-secrets
  namespace: studentvc
  labels:
    app: studentvc-multi-tenant
type: Opaque
stringData:
  tub-db-password: "tub-secure-password"
  fub-db-password: "fub-secure-password"
  root-db-password: "root-secure-password"
---
# API Keys Secret
apiVersion: v1
kind: Secret
metadata:
  name: api-keys-secret
  namespace: studentvc
  labels:
    app: studentvc-multi-tenant
type: Opaque
stringData:
  jwt-secret: "your-super-secure-jwt-secret-key-here"
  encryption-key: "your-32-byte-encryption-key-here"
  webhook-secret: "your-webhook-verification-secret" 