version: '3.8'

services:
  viable-credentials:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: app
    container_name: viable-credentials
    ports:
      - "8080:8080"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DOCKER_MODE=true
      - ACCEPT_SELF_SIGNED_CERTS=true
      - PYTHONPATH=/app
      # 🚀 PRODUCTION SERVER URL: Override Docker internal IP with external server address
      - EXTERNAL_SERVER_URL=${EXTERNAL_SERVER_URL:-https://localhost:8080}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
      - PUBLIC_PORT=${PUBLIC_PORT:-8080}
      - USE_EXTERNAL_URL=${USE_EXTERNAL_URL:-false}
      # 🚀 SOCKET.IO FIX: Allow Socket.IO to work in Docker with external access
      - SOCKET_IO_URL=${SOCKET_IO_URL:-https://localhost:8080}
      - CORS_ORIGINS=*
    volumes:
      - viable-credentials_data:/app/instance
    restart: unless-stopped
    healthcheck:
      # 🚀 HEALTH CHECK FIX: Use HTTP for internal health checks, HTTPS is handled at container level
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - viable-credentials-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-viable-credentials
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - viable-credentials-network
    restart: unless-stopped

networks:
  viable-credentials-network:
    driver: bridge

volumes:
  viable-credentials_data:
  prometheus_data:
