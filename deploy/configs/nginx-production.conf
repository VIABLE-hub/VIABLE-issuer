events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Upstream definitions for StudentVC services
    upstream studentvc_tub {
        server studentvc-tub:8080;
    }
    
    upstream studentvc_fub {
        server studentvc-fub:8080;
    }
    
    upstream studentvc_root {
        server studentvc-root:8080;
    }
    
    # TU Berlin (TUB) - PRODUCTION
    server {
        listen 80;
        server_name tub.85-215-156-198.sslip.io;
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name tub.85-215-156-198.sslip.io;
        
        # SSL Configuration (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/tub.85-215-156-198.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tub.85-215-156-198.sslip.io/privkey.pem;
        ssl_session_timeout 5m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        
        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-ID "tub";
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        location / {
            proxy_pass http://studentvc_tub;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://studentvc_tub/health;
            access_log off;
        }
    }
    
    # FU Berlin (FUB) - PRODUCTION
    server {
        listen 80;
        server_name fub.85-215-156-198.sslip.io;
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name fub.85-215-156-198.sslip.io;
        
        # SSL Configuration (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/fub.85-215-156-198.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fub.85-215-156-198.sslip.io/privkey.pem;
        ssl_session_timeout 5m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        
        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-ID "fub";
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        location / {
            proxy_pass http://studentvc_fub;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://studentvc_fub/health;
            access_log off;
        }
    }
    
    # Root Tenant - PRODUCTION
    server {
        listen 80;
        server_name root.85-215-156-198.sslip.io;
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name root.85-215-156-198.sslip.io;
        
        # SSL Configuration (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/root.85-215-156-198.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/root.85-215-156-198.sslip.io/privkey.pem;
        ssl_session_timeout 5m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers on;
        
        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-ID "root";
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        location / {
            proxy_pass http://studentvc_root;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://studentvc_root/health;
            access_log off;
        }
    }
    
    # Default server (catch-all)
    server {
        listen 80 default_server;
        listen 443 ssl http2 default_server;
        server_name _;
        
        # SSL Configuration for default server (fallback cert)
        ssl_certificate /etc/letsencrypt/live/root.85-215-156-198.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/root.85-215-156-198.sslip.io/privkey.pem;
        
        return 444; # Close connection without response
    }
} 