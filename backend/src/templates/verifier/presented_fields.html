<script>
// ✅ Toggle function for collapsible field sections
function toggleFieldSection(sectionName) {
    const content = document.getElementById(sectionName + '-section-content');
    const icon = document.getElementById(sectionName + '-toggle-icon');
    
    if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.classList.add('rotated');
    } else {
        content.style.display = 'none';
        icon.classList.remove('rotated');
    }
}
</script>
