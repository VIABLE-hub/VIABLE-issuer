<!-- Left: Compact QR Code Section -->
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
  <div class="text-center">
    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center justify-center">
      <i class="fas fa-qrcode berlin-blue mr-2 text-lg"></i>
      QR-Code Scanner
    </h2>
    
    <!-- Compact QR Code Container -->
    <div class="qr-container rounded-lg p-4 mb-3 inline-block">
      <img
        id="qr-code"
        src="data:image/png;base64,{{ img_data }}"
        alt="QR Code für Credential Verifikation"
        class="w-48 h-48 mx-auto rounded-lg shadow-sm"
      />
    </div>
    
    <!-- Clear instruction below QR -->
    <p class="text-sm font-medium text-gray-700 mb-4">
      Scannen Sie das VC, um den Status zu prüfen
    </p>
    
    <!-- OID4VP URL Information -->
    {% if presentation_request_url %}
    <div class="mt-4 p-3 bg-gray-50 rounded-lg border border-gray-200 text-left">
      <h4 class="text-xs font-semibold text-gray-700 mb-1 flex items-center">
        <i class="fas fa-link mr-1 text-gray-500"></i>
        OID4VP Presentation Request URL:
      </h4>
      <div class="text-xs text-gray-600 break-all font-mono bg-white p-2 rounded border border-gray-300">
        {{ presentation_request_url }}
      </div>
      <button 
        type="button"
        onclick="navigator.clipboard.writeText('{{ presentation_request_url }}'); this.innerHTML = '<i class=\'fas fa-check mr-1\'></i>Copied!'; setTimeout(() => { this.innerHTML = '<i class=\'fas fa-copy mr-1\'></i>Copy URL'; }, 2000);"
        class="mt-2 px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md border border-gray-300 shadow-sm transition-all duration-200"
      >
        <i class="fas fa-copy mr-1"></i>Copy URL
      </button>
    </div>
    {% endif %}
  </div>
</div>
