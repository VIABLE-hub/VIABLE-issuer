{% extends "base.html" %} {% block title %}Register{% endblock %} {% block content %}

<div class="min-h-[calc(100vh-12rem)] flex items-center justify-center">
  <div class="custom-glass-panel  shadow-xl rounded-[5px] p-6 w-full max-w-md border border-gray-200">
    <div class="flex flex-col sm:flex-row sm:items-baseline space-y-1 sm:space-y-0 sm:space-x-4 mb-6 pb-2 border-b border-gray-200/50">
  <h1 class="text-xl font-bold text-gray-900 leading-none">Registrieren</h1>
  <span class="text-sm text-gray-500 sm:border-l border-gray-300 sm:pl-4">Erstellen Sie Ihr StudentVC-Konto</span>
</div>
    
    <form action="/register" method="post" class="space-y-5">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-user mr-2 text-berlin-blue"></i>Benutzername
        </label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-berlin-blue focus:border-berlin-blue transition-all duration-200 bg-gray-50 focus:bg-white"
          placeholder="Ihr Benutzername"
        />
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-berlin-blue"></i>Passwort
        </label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required
          class="w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-berlin-blue focus:border-berlin-blue transition-all duration-200 bg-gray-50 focus:bg-white"
          placeholder="Ihr Passwort"
        />
      </div>
      
      <button 
        type="submit" 
        class="w-full bg-berlin-blue text-white py-2.5 px-4 rounded-lg hover:bg-berlin-dark focus:ring-2 focus:ring-berlin-blue focus:ring-offset-2 transition-all duration-200 font-medium shadow-sm hover:shadow-md"
      >
        <i class="fas fa-user-plus mr-2"></i>Registrieren
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">
        Bereits registriert? 
        <a href="/login" class="text-berlin-blue hover:text-berlin-dark font-medium transition-colors duration-200 hover:underline">Hier anmelden</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
