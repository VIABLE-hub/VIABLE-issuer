<!-- University Branding Component -->
<div class="bg-white rounded-xl border border-gray-200 shadow-md overflow-hidden h-full content-card mt-4">
  <div class="p-3 bg-[#003f7f] text-white border-b border-gray-700">
    <div class="flex items-center justify-between">
      <h2 class="flex items-center text-sm font-semibold">
        <i class="fas fa-university mr-2"></i>
        Hochschul-Branding
      </h2>
      <span class="inline-flex items-center px-1.5 py-0.5 rounded-full text-xs font-medium bg-blue-800 text-white">
        <i class="fas fa-palette mr-1"></i> Berlin-Blau-Theme
      </span>
    </div>
  </div>
  
  <div class="p-4 space-y-4">
    <div class="form-group space-y-2">
      <div class="flex items-center justify-between mb-0">
        <p class="text-xs text-gray-500">Passen Sie das Design für Ihre Hochschule an</p>
      </div>
      
      <!-- Verstecktes Feld für Standard-Logo-Wert -->
      <input type="hidden" name="default_logo" value="{% if form_data and form_data.default_logo %}{{ form_data.default_logo }}{% else %}studentVC-logo-sora-cropped-darkmode.png{% endif %}" />
    
      <!-- Theme Name in horizontaler Zeile -->
      <div class="flex items-center gap-x-2">
        <label for="theme_name" class="text-xs font-medium text-gray-700 whitespace-nowrap">Theme Name:</label>
        <input
            type="text"
            class="form-control flex-1 border border-gray-300 px-2 py-1 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-berlin-blue focus:border-transparent form-element-height"
            id="theme_name"
            name="theme[name]"
            placeholder="Technische Universität Berlin"
            value="{% if form_data and form_data.theme_name %}{{ form_data.theme_name }}{% endif %}"
          />
      </div>

      <label for="theme_icon" class="block text-xs font-medium text-gray-700 mb-0">Theme Icon</label>
      <div class="flex items-center space-x-3 mt-1">
        <!-- Linke Seite: Bildvorschau mit Berlin-Blau-Hintergrund für weißes transparentes Logo -->
        <div id="themeIconPreviewContainer" class="flex-none w-16 h-16 rounded-lg overflow-hidden border border-gray-200 shadow-sm hover:shadow-md transition-all duration-200 relative cursor-pointer" style="background: linear-gradient(135deg, #003f7f 0%, #0066cc 100%);">
          <img 
            id="themeIconPreview" 
            src="{% if form_data and form_data.theme_icon %}{{ form_data.theme_icon }}{% else %}{{ url_for('static', filename='studentVC-logo-sora-cropped-darkmode.png') }}{% endif %}" 
            alt="Vorschau" 
            class="w-full h-full object-contain p-2"
            onerror="this.src='{{ url_for('static', filename='studentVC-logo-sora-cropped-darkmode.png') }}';"
          />
          <div class="absolute inset-0 bg-black bg-opacity-0 hover:bg-opacity-10 flex items-center justify-center transition-all duration-200">
            <i class="fas fa-camera text-white opacity-0 hover:opacity-100 transition-opacity duration-200 text-shadow-sm text-xs"></i>
          </div>
        </div>
        
        <!-- Mittlere Spalte: Upload-Box - Kompakter -->
        <div class="flex-grow">
          <div id="themeDropZone" class="border border-dashed border-gray-300 rounded-lg p-2 flex items-center justify-center bg-gray-50 relative hover:bg-gray-100 transition-colors group form-element-height min-h-[2.5rem]">
            <div class="flex flex-col items-center">
              <i class="fas fa-cloud-upload-alt text-gray-400 group-hover:text-gray-600 transition-colors text-sm"></i>
              <span class="text-xs text-gray-500 text-center mt-0.5">Logo hochladen<br class="hidden sm:block">oder ablegen</span>
            </div>
            <input
              type="file"
              class="form-control absolute inset-0 w-full h-full opacity-0 cursor-pointer"
              id="theme_icon"
              name="theme[icon]"
              accept="image/*"
            />
          </div>
        </div>
        
        <!-- Rechte Spalte: Reset Button - Angepasst an neue Icon-Größe -->
        <button 
          type="button" 
          id="resetThemeIconBtn"
          class="flex-none w-8 h-8 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-500 hover:text-gray-700 transition-colors shadow-sm hover:shadow-md border border-gray-200" 
          title="Zurücksetzen"
          onclick="document.querySelector('input[name=default_logo]').value='studentVC-logo-sora-cropped-darkmode.png'"
        >
          <i class="fas fa-undo text-xs"></i>
        </button>
      </div>

      <!-- 4-Farben Berlin-Blau-Theme -->
      <div class="grid grid-cols-2 gap-2 mt-1">
        <div>
          <label for="bg_color_card" class="block text-xs font-medium text-gray-700">Hintergrundfarbe</label>
          <div class="relative flex items-center">
            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1 pl-6 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-berlin-blue focus:border-transparent form-element-height"
              id="bg_color_card"
              name="theme[bgColorCard]"
              placeholder="003f7f"
              value="{% if form_data and form_data.theme_bgColorCard %}{{ form_data.theme_bgColorCard }}{% else %}003f7f{% endif %}"
            />
            <div class="w-3 h-3 rounded ml-1 bg-[#003f7f]" title="Vorschau"></div>
          </div>
        </div>
        
        <div>
          <label for="fg_color_title" class="block text-xs font-medium text-gray-700">Titelfarbe</label>
          <div class="relative flex items-center">
            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1 pl-6 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-berlin-blue focus:border-transparent form-element-height"
              id="fg_color_title"
              name="theme[fgColorTitle]"
              placeholder="FFFFFF"
              value="{% if form_data and form_data.theme_fgColorTitle %}{{ form_data.theme_fgColorTitle }}{% else %}FFFFFF{% endif %}"
            />
            <div class="w-3 h-3 rounded ml-1 bg-[#FFFFFF] border border-gray-200" title="Vorschau"></div>
          </div>
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-2 mt-1">
        <div>
          <label for="accent_color" class="block text-xs font-medium text-gray-700">Akzentfarbe</label>
          <div class="relative flex items-center">
            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1 pl-6 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-berlin-blue focus:border-transparent form-element-height"
              id="accent_color"
              name="theme[accentColor]"
              placeholder="E6007E"
              value="{% if form_data and form_data.theme_accentColor %}{{ form_data.theme_accentColor }}{% else %}E6007E{% endif %}"
            />
            <div class="w-3 h-3 rounded ml-1 bg-[#E6007E]" title="Vorschau"></div>
          </div>
        </div>
        
        <div>
          <label for="text_color" class="block text-xs font-medium text-gray-700">Textfarbe</label>
          <div class="relative flex items-center">
            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1 pl-6 text-xs rounded-md focus:outline-none focus:ring-1 focus:ring-berlin-blue focus:border-transparent form-element-height"
              id="text_color"
              name="theme[textColor]"
              placeholder="333333"
              value="{% if form_data and form_data.theme_textColor %}{{ form_data.theme_textColor }}{% else %}333333{% endif %}"
            />
            <div class="w-3 h-3 rounded ml-1 bg-[#333333]" title="Vorschau"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
