<!-- Steuerungsleiste für VC Status -->
<div class="control-group">
  <div class="flex-grow flex flex-wrap gap-2">
    <!-- Suchfeld mit Icon -->
    <div class="search-container">
      <span class="search-icon">
        <i class="fas fa-search"></i>
      </span>
      <input type="text" 
             id="search-input" 
             class="input-search" 
             placeholder="Suche nach ID, Name, Matrikelnr..."
             onkeyup="filterTable()">
    </div>
    
    <!-- Status-Filter -->
    <select id="status-filter" class="select-filter" onchange="filterTable()">
      <option value="all">Alle Status</option>
      <option value="active">Aktiv</option>
      <option value="revoked">Zurückgezogen</option>
    </select>
  </div>
  
  <!-- Aktualisierungsbutton -->
  <a href="/vcstatus" class="btn-refresh" title="Liste aktualisieren">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
    </svg>
    Aktualisieren
  </a>
</div>
