<!-- CSS-Styles für VC Status Page -->
<style>
  /* Base Colors and Variables */
  :root {
    --berlin-blue: #0072bb;
    --berlin-blue-dark: #005a94;
    --berlin-blue-light: #e6f3fa;
    --success: #00a854;
    --success-light: #e6f7ee;
    --warning: #fa8c16;
    --warning-light: #fff7e6;
    --danger: #f5222d;
    --danger-light: #fff1f0;
    --neutral: #6b7280;
    --neutral-light: #f3f4f6;
  }
  
  /* Status-Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
  }
  
  .badge-active {
    background-color: #d1fae5;
    color: #065f46;
  }
  
  .badge-revoked {
    background-color: #fee2e2;
    color: #b91c1c;
  }
  
  /* Tabelle mit fixiertem Header */
  .table-container {
    position: relative;
    overflow: hidden;
    border-radius: 0.75rem;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    border: 1px solid #e5e7eb;
  }
  
  .table-container .table-scroll {
    overflow: auto;
    max-height: calc(100vh - 280px);
  }
  
  .table-header {
    position: sticky;
    top: 0;
    z-index: 10;
    font-size: 0.75rem;
    font-weight: 500;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background-color: #f8fafc;
  }
  
  /* Improved Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    border-radius: 0.375rem;
    font-size: 0.75rem;
    font-weight: 500;
    transition-property: all;
    transition-duration: 200ms;
  }
  
  .btn:focus {
    outline: none;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px;
  }
  
  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  
  .btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    border-radius: 0.375rem;
    font-size: 0.75rem;
    font-weight: 500;
    transition-property: all;
    transition-duration: 200ms;
  }
  
  .btn-revoke {
    background-color: #ef4444;
    color: white;
    padding: 0.375rem 0.625rem;
  }
  
  .btn-revoke:hover {
    background-color: #dc2626;
  }
  
  .btn-revoke:focus {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #ef4444;
  }
  
  .btn-unrevoke {
    background-color: #10b981;
    color: white;
    padding: 0.375rem 0.625rem;
  }
  
  .btn-unrevoke:hover {
    background-color: #059669;
  }
  
  .btn-unrevoke:focus {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #10b981;
  }
  
  .btn-delete {
    background-color: #6b7280;
    color: white;
    padding: 0.375rem 0.625rem;
  }
  
  .btn-delete:hover {
    background-color: #4b5563;
  }
  
  .btn-delete:focus {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #6b7280;
  }
  
  .btn-refresh {
    background-color: #2563eb;
    color: white;
    padding: 0.5rem 0.75rem;
  }
  
  .btn-refresh:hover {
    background-color: #1d4ed8;
  }
  
  .btn-refresh:focus {
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #2563eb;
  }
  
  /* Stat Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(1, minmax(0, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  
  @media (min-width: 640px) {
    .kpi-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }
  
  .kpi-card {
    background-color: white;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    border-radius: 0.75rem;
    padding: 1rem;
    text-align: center;
    border: 1px solid #f3f4f6;
    transition-property: all;
    transition-duration: 300ms;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .kpi-card:hover {
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  
  .kpi-card .title {
    font-size: 0.875rem;
    font-weight: 600;
    color: #4b5563;
  }
  
  .kpi-card .value {
    font-size: 1.875rem;
    font-weight: 700;
    margin-top: 0.5rem;
    margin-bottom: 0.25rem;
  }
  
  .kpi-card .indicator {
    display: inline-flex;
    align-items: center;
    font-size: 0.75rem;
  }
  
  .kpi-card .dot {
    width: 0.625rem;
    height: 0.625rem;
    border-radius: 9999px;
    margin-right: 0.375rem;
  }
  
  /* Card decorations */
  .kpi-card.active-card {
    border-color: #d1fae5;
  }
  
  .kpi-card.revoked-card {
    border-color: #fee2e2;
  }
  
  .kpi-card.total-card {
    border-color: #dbeafe;
  }
  
  /* Mobile Card View */
  .table-mobile-card {
    display: block;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    margin-bottom: 0.75rem;
    padding: 1rem;
    background-color: white;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    transition-property: all;
    transition-duration: 300ms;
  }
  
  .table-mobile-card:hover {
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }
  
  .table-mobile-card .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  
  .table-mobile-card .card-body {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  
  .table-mobile-card .card-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid #f3f4f6;
    gap: 0.5rem;
  }
  
  /* Search & Filter Controls */
  .control-group {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  
  .search-container {
    position: relative;
    flex-grow: 1;
    max-width: 28rem;
    display: flex;
    align-items: center;
  }
  
  .search-icon {
    position: absolute;
    left: 0.75rem;
    color: #9ca3af;
  }
  
  .input-search {
    padding-left: 2.5rem;
    padding-right: 0.75rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    font-size: 0.875rem;
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  }
  
  .input-search:focus {
    outline: none;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #3b82f6;
    border-color: #3b82f6;
  }
  
  .select-filter {
    padding-left: 0.75rem;
    padding-right: 0.75rem;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    font-size: 0.875rem;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    background-color: white;
  }
  
  .select-filter:focus {
    outline: none;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #3b82f6;
    border-color: #3b82f6;
  }
  
  /* Table hover styles */
  .hover-row:hover {
    background-color: #eff6ff;
    transition-property: all;
    transition-duration: 200ms;
  }
  
  /* Tooltip */
  .tooltip {
    position: relative;
    display: inline-block;
  }
  
  .tooltip .tooltip-text {
    visibility: hidden;
    position: absolute;
    z-index: 10;
    padding: 0.5rem;
    font-size: 0.75rem;
    color: white;
    background-color: #1f2937;
    border-radius: 0.375rem;
    opacity: 0;
    transition-property: opacity;
    transition-duration: 300ms;
    width: 120px;
    bottom: 125%;
    left: 50%;
    margin-left: -60px;
    text-align: center;
  }
  
  .tooltip:hover .tooltip-text {
    visibility: visible;
    opacity: 100%;
  }
  
  /* Empty state */
  .empty-state {
    padding: 2rem;
    text-align: center;
    color: #6b7280;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  /* Tag list for status */
  .tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.375rem;
  }
  
  /* Berlin Blue Text - Verifier Style */
  .berlin-blue {
    color: var(--berlin-blue);
  }

  .berlin-bg {
    background-color: var(--berlin-blue);
  }

  .berlin-border {
    border-color: var(--berlin-blue);
  }

  /* Pagination Styles */
  .pagination {
    display: flex;
    justify-content: center;
    margin-top: 1.5rem;
  }

  .pagination-container {
    display: flex;
    align-items: center;
  }

  .pagination-info {
    font-size: 0.875rem;
    color: #6b7280;
    margin-right: 1rem;
  }

  .pagination-button {
    padding: 0.375rem 0.75rem;
    font-size: 0.875rem;
    color: #374151;
    background-color: white;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    margin: 0 0.25rem;
    cursor: pointer;
    transition-duration: 200ms;
  }

  .pagination-button:hover:not(:disabled) {
    background-color: #f3f4f6;
  }

  .pagination-button:disabled {
    color: #9ca3af;
    cursor: not-allowed;
  }

  .pagination-button.active {
    background-color: #3b82f6;
    color: white;
    border-color: #3b82f6;
  }

  /* Sortierbare Tabellenspalten */
  .sortable {
    cursor: pointer;
    position: relative;
  }

  .sortable::after {
    content: "⇅";
    position: absolute;
    right: 0.5rem;
    opacity: 0.5;
    font-size: 0.75rem;
  }

  .sortable.sorted-asc::after {
    content: "↑";
    opacity: 1;
  }

  .sortable.sorted-desc::after {
    content: "↓";
    opacity: 1;
  }
</style>
