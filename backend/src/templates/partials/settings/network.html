<!-- 🌐 HERZCHIRURG Network Configuration - Emergency Fix -->
<div class="space-y-6">
  <!-- Current Network Info Display -->
  <div class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-700 dark:to-gray-600 rounded-lg p-4 border border-blue-200 dark:border-gray-600">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
      Current Network Status
    </h3>
    <template x-if="loadingNetwork">
      <div class="flex items-center justify-center h-16">
        <svg class="animate-spin h-6 w-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="ml-2 text-gray-600 dark:text-gray-400">Loading network information...</span>
      </div>
    </template>
    <template x-if="!loadingNetwork">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Local IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkInfo?.local_ip || 'Loading...'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Public IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkInfo?.public_ip || 'Not available'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Hostname:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkInfo?.hostname || 'Unknown'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Default Port:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkInfo?.default_port || '8080'"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- URL Preview Section -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
      </svg>
      Generated URLs
    </h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Issuer URL:</label>
        <div class="flex items-center space-x-2">
          <code class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm font-mono text-gray-900 dark:text-gray-100" x-text="getIssuerUrl()"></code>
          <button @click="copyToClipboard(getIssuerUrl())" class="p-2 text-gray-500 hover:text-blue-600 transition-colors border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Verifier URL:</label>
        <div class="flex items-center space-x-2">
          <code class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm font-mono text-gray-900 dark:text-gray-100" x-text="getVerifierUrl()"></code>
          <button @click="copyToClipboard(getVerifierUrl())" class="p-2 text-gray-500 hover:text-blue-600 transition-colors border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Ngrok Configuration -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-medium text-gray-900 dark:text-white flex items-center">
        <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h.5A2.5 2.5 0 0020 5.5v-1.5"></path>
        </svg>
        Ngrok Configuration
      </h3>
      <label class="flex items-center cursor-pointer">
        <input type="checkbox" x-model="networkSettings.use_ngrok" @change="updateNetworkSettings()" class="sr-only">
        <div class="relative">
          <div class="block bg-gray-600 w-14 h-8 rounded-full" :class="{'bg-blue-600': networkSettings.use_ngrok}"></div>
          <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition transform" :class="{'translate-x-6': networkSettings.use_ngrok}"></div>
        </div>
        <span class="ml-3 text-sm font-medium text-gray-700 dark:text-gray-300">Enable Ngrok</span>
      </label>
    </div>
    
    <template x-if="networkSettings.use_ngrok">
      <div class="space-y-4">
        <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4">
          <h4 class="text-sm font-medium text-yellow-800 dark:text-yellow-200 mb-2 flex items-center">
            <svg class="w-4 h-4 mr-1 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
            </svg>
            Ngrok Setup Instructions
          </h4>
          <ol class="text-xs text-yellow-700 dark:text-yellow-300 space-y-1 list-decimal list-inside">
            <li>Install ngrok: <code class="bg-yellow-100 dark:bg-yellow-800 px-1 rounded">brew install ngrok</code></li>
            <li>Get your authtoken from <a href="https://dashboard.ngrok.com/get-started/your-authtoken" target="_blank" class="underline hover:text-yellow-900 dark:hover:text-yellow-100">ngrok dashboard</a></li>
            <li>Configure ngrok: <code class="bg-yellow-100 dark:bg-yellow-800 px-1 rounded">ngrok config add-authtoken YOUR_TOKEN</code></li>
            <li>Start tunnel: <code class="bg-yellow-100 dark:bg-yellow-800 px-1 rounded">ngrok http 8080</code></li>
            <li>Copy the ngrok URL (e.g., https://abc123.ngrok.io) and paste below</li>
          </ol>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Ngrok Public URL</label>
          <div class="flex items-center space-x-2">
            <input 
              type="url" 
              x-model="networkSettings.ngrok_url" 
              @input="updateNetworkSettings()"
              placeholder="https://abc123.ngrok.io" 
              class="flex-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            >
            <button @click="testNgrokUrl()" class="inline-flex items-center px-3 py-2 border border-gray-300 dark:border-gray-600 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
              Test
            </button>
          </div>
          <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
            Enter your ngrok public URL (must end with .ngrok.io or .ngrok-free.app)
          </p>
        </div>

        <!-- Ngrok URL Validation -->
        <template x-if="networkSettings.ngrok_url">
          <div class="p-3 rounded-lg" :class="isValidNgrokUrl() ? 'bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800'">
            <div class="flex items-center">
              <template x-if="isValidNgrokUrl()">
                <svg class="w-4 h-4 text-green-600 dark:text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
              </template>
              <template x-if="!isValidNgrokUrl()">
                <svg class="w-4 h-4 text-red-600 dark:text-red-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </template>
              <span class="text-sm font-medium" :class="isValidNgrokUrl() ? 'text-green-800 dark:text-green-200' : 'text-red-800 dark:text-red-200'">
                <template x-if="isValidNgrokUrl()">Valid ngrok URL</template>
                <template x-if="!isValidNgrokUrl()">Invalid ngrok URL - must be https:// and contain .ngrok.io or .ngrok-free.app</template>
              </span>
            </div>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Manual Network Configuration -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
      Manual Network Configuration
    </h3>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Issuer Configuration -->
      <div>
        <h4 class="text-md font-medium text-gray-800 dark:text-gray-200 mb-3 flex items-center">
          <svg class="w-4 h-4 mr-1 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
          </svg>
          Issuer Service
        </h4>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">IP Address</label>
            <input 
              type="text" 
              x-model="networkSettings.issuer_ip" 
              @input="updateNetworkSettings()"
              placeholder="192.168.178.122" 
              class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Port</label>
            <input 
              type="number" 
              x-model="networkSettings.issuer_port" 
              @input="updateNetworkSettings()"
              placeholder="8080" 
              min="1" 
              max="65535"
              class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            >
          </div>
        </div>
      </div>

      <!-- Verifier Configuration -->
      <div>
        <h4 class="text-md font-medium text-gray-800 dark:text-gray-200 mb-3 flex items-center">
          <svg class="w-4 h-4 mr-1 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
          </svg>
          Verifier Service
        </h4>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">IP Address</label>
            <input 
              type="text" 
              x-model="networkSettings.verifier_ip" 
              @input="updateNetworkSettings()"
              placeholder="192.168.178.122" 
              class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            >
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Port</label>
            <input 
              type="number" 
              x-model="networkSettings.verifier_port" 
              @input="updateNetworkSettings()"
              placeholder="8080" 
              min="1" 
              max="65535"
              class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
            >
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Additional Settings -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
      </svg>
      Additional Settings
    </h3>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium text-gray-700 dark:text-gray-300">HTTPS/SSL</span>
          <label class="flex items-center cursor-pointer">
            <input type="checkbox" x-model="networkSettings.use_https" @change="updateNetworkSettings()" class="sr-only">
            <div class="relative">
              <div class="block bg-gray-600 w-14 h-8 rounded-full" :class="{'bg-blue-600': networkSettings.use_https}"></div>
              <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition transform" :class="{'translate-x-6': networkSettings.use_https}"></div>
            </div>
          </label>
        </div>
        
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Auto-Discovery</span>
          <label class="flex items-center cursor-pointer">
            <input type="checkbox" x-model="networkSettings.auto_discovery" @change="updateNetworkSettings()" class="sr-only">
            <div class="relative">
              <div class="block bg-gray-600 w-14 h-8 rounded-full" :class="{'bg-blue-600': networkSettings.auto_discovery}"></div>
              <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition transform" :class="{'translate-x-6': networkSettings.auto_discovery}"></div>
            </div>
          </label>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Connection Timeout (seconds)</label>
        <input 
          type="number" 
          x-model="networkSettings.timeout" 
          @input="updateNetworkSettings()"
          placeholder="30" 
          min="5" 
          max="300"
          class="block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
        >
      </div>
    </div>
  </div>

  <!-- Connection Test Section -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-medium text-gray-900 dark:text-white flex items-center">
        <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
        </svg>
        Connection Test
      </h3>
      <button 
        @click="testConnection()" 
        :disabled="testingConnection"
        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <template x-if="!testingConnection">
          <span>Test Connections</span>
        </template>
        <template x-if="testingConnection">
          <span class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Testing...
          </span>
        </template>
      </button>
    </div>
    
    <template x-if="connectionTestResults">
      <div class="space-y-3">
        <div class="p-3 rounded-lg border" :class="connectionTestResults.test_results?.issuer_api?.status === 'success' ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'">
          <div class="flex items-center justify-between">
            <span class="font-medium text-sm">Issuer Connection</span>
            <span class="text-xs" :class="connectionTestResults.test_results?.issuer_api?.status === 'success' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="connectionTestResults.test_results?.issuer_api?.latency_ms + 'ms'"></span>
          </div>
          <div class="mt-1">
            <div class="text-xs text-gray-600 dark:text-gray-400" x-text="connectionTestResults.test_results?.issuer_api?.url_tested"></div>
            <div class="text-xs mt-1" :class="connectionTestResults.test_results?.issuer_api?.status === 'success' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="connectionTestResults.test_results?.issuer_api?.status === 'success' ? 'Connected successfully' : connectionTestResults.test_results?.issuer_api?.error"></div>
          </div>
        </div>
        
        <div class="p-3 rounded-lg border" :class="connectionTestResults.test_results?.verifier_api?.status === 'success' ? 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800' : 'bg-red-50 dark:bg-red-900/20 border-red-200 dark:border-red-800'">
          <div class="flex items-center justify-between">
            <span class="font-medium text-sm">Verifier Connection</span>
            <span class="text-xs" :class="connectionTestResults.test_results?.verifier_api?.status === 'success' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="connectionTestResults.test_results?.verifier_api?.latency_ms + 'ms'"></span>
          </div>
          <div class="mt-1">
            <div class="text-xs text-gray-600 dark:text-gray-400" x-text="connectionTestResults.test_results?.verifier_api?.url_tested"></div>
