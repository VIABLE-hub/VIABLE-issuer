<!-- Linke Spalte: Formularfelder -->
<div class="bg-white rounded-xl border border-gray-200 shadow-md overflow-hidden h-full content-card">
  <div class="p-3 bg-gradient-to-r from-gray-50 to-gray-100 border-b border-gray-200">
    <div class="flex items-center justify-between">
      <h2 class="flex items-center text-sm font-semibold text-gray-900">
        <i class="fas fa-user-graduate text-berlin-blue mr-2"></i>
        Studierendendaten
      </h2>
      <div class="flex space-x-2">
        <button type="button" id="randomDataBtn" class="px-3 py-1 text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg border border-gray-300 shadow-sm flex items-center transition-all duration-200" onclick="fillRandomData(); return false;">
          <i class="fas fa-random mr-1"></i> Zufäll. Daten
        </button>
        <button type="submit" form="myForm" class="px-3 py-1 text-xs bg-[#18206c] hover:bg-berlin-blue text-white rounded-lg shadow-md flex items-center font-semibold transition-all duration-200">
          <i class="fas fa-qrcode mr-1"></i> QR-Code generieren
        </button>
      </div>
    </div>
  </div>
  
  <div class="p-4 space-y-4 bg-white">
    <form
      id="myForm"
      action="/issuer"
      method="post"
      enctype="multipart/form-data"
    >
      <div class="form-group space-y-2">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="firstName" class="block text-xs font-medium text-gray-700 mb-1">First Name</label>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
              id="firstName"
              name="firstName"
              placeholder="Maxi"
              value="{% if form_data and form_data.firstName %}{{ form_data.firstName }}{% endif %}"
            />
          </div>
          <div>
            <label for="lastName" class="block text-xs font-medium text-gray-700 mb-1">Last Name</label>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
              id="lastName"
              name="lastName"
              placeholder="Musterfrau"
              value="{% if form_data and form_data.lastName %}{{ form_data.lastName }}{% endif %}"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label for="studentId" class="block text-xs font-medium text-gray-700 mb-1">Student ID</label>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
              id="studentId"
              name="studentId"
              placeholder="123456"
              value="{% if form_data and form_data.studentId %}{{ form_data.studentId }}{% endif %}"
            />
          </div>
          <div>
            <label for="studentIdPrefix" class="block text-xs font-medium text-gray-700 mb-1">Student ID Prefix</label>
            <input
              type="text"
              class="form-control w-full border border-gray-300 px-2 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
              id="studentIdPrefix"
              name="studentIdPrefix"
              placeholder="654321"
              value="{% if form_data and form_data.studentIdPrefix %}{{ form_data.studentIdPrefix }}{% endif %}"
            />
          </div>
        </div>

        <div class="mt-1">
          <label for="profileImage" class="block text-xs font-medium text-gray-700 mb-2">Profile Image</label>
          <div class="flex items-center space-x-4">
            <!-- Linke Seite: Bildvorschau - Verbesserte Ästhetik -->
            <div id="imagePreviewContainer" class="flex-none w-24 h-24 rounded-lg overflow-hidden border border-gray-200 shadow-sm hover:shadow-lg transition-all duration-300 bg-gray-50 relative cursor-pointer form-element-height">
              <img 
                id="imagePreview" 
                src="{% if form_data and form_data.profile_image %}data:image/png;base64,{{ form_data.profile_image }}{% else %}{{ url_for('static', filename='student.png') }}{% endif %}" 
                alt="Vorschau" 
                class="w-full h-full object-cover"
              />
              <div class="absolute inset-0 bg-black bg-opacity-0 hover:bg-opacity-20 flex items-center justify-center transition-all duration-200">
                <i class="fas fa-camera text-white opacity-0 hover:opacity-100 transition-opacity duration-200 text-shadow-sm"></i>
              </div>
            </div>
            
            <!-- Mittlere Spalte: Upload-Box mit besserem Hover-Effekt -->
            <div class="flex-grow">
              <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-3 flex items-center justify-center bg-gray-50 relative hover:bg-blue-50 hover:border-berlin-blue transition-all duration-300 group form-element-height min-h-[3.5rem]">
                <div class="flex flex-col items-center">
                  <i class="fas fa-cloud-upload-alt text-gray-400 group-hover:text-berlin-blue transition-colors"></i>
                  <span class="text-xs text-gray-500 group-hover:text-berlin-blue text-center mt-1 transition-colors">Ziehen Sie ein Bild hierher<br class="hidden sm:block"> oder klicken Sie</span>
                </div>
                <input
                  type="file"
                  class="form-control absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                  id="profileImage"
                  name="image"
                  accept=".png,.jpg,.jpeg"
                />
              </div>
            </div>
            
            <!-- Rechte Spalte: Reset Button mit besserem Hover-Effekt -->
            <button 
              type="button" 
              id="resetImageBtn"
              class="flex-none w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-500 hover:text-gray-700 transition-all duration-200 shadow-sm hover:shadow-md border border-gray-200 form-element-height" 
              title="Zurücksetzen"
            >
              <i class="fas fa-undo text-xs"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Einklappbarer Bereich für Theme-Einstellungen mit verbesserter Optik -->
      <details class="mt-6 border border-gray-200 rounded-xl shadow-sm group">
        <summary class="flex items-center justify-between p-3 cursor-pointer bg-gradient-to-r from-blue-50 to-indigo-50 hover:from-blue-100 hover:to-indigo-100 rounded-xl transition-colors duration-200 focus:outline-none">
          <div class="flex items-center">
            <div class="bg-blue-100 rounded-full p-1.5 mr-2 shadow-sm">
              <i class="fas fa-palette text-blue-600 text-sm"></i>
            </div>
            <h2 class="text-sm font-medium text-gray-900">Hochschul-Branding</h2>
          </div>
          <span class="text-berlin-blue transition-transform duration-300 group-open:rotate-180">
            <i class="fas fa-chevron-down"></i>
          </span>
        </summary>
        
        <div class="p-4 border-t border-gray-200 animate-fade-in-down bg-white space-y-3">
          <div class="form-group space-y-3">
            <div class="flex items-center justify-between mb-1">
              <p class="text-xs text-gray-500">Passen Sie das Design für Ihre Hochschule an</p>
            </div>
            
            <!-- Verstecktes Feld für Standard-Logo-Wert -->
            <input type="hidden" name="default_logo" value="{% if form_data and form_data.default_logo %}{{ form_data.default_logo }}{% else %}studentVC-logo-sora-cropped-darkmode.png{% endif %}" />
          
            <!-- Theme Name in horizontaler Zeile mit besserem Styling -->
            <div class="flex items-center gap-x-3">
              <label for="theme_name" class="text-xs font-medium text-gray-700 whitespace-nowrap">Theme Name:</label>
              <input
                  type="text"
                  class="form-control flex-1 border border-gray-300 px-2 py-1.5 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
                  id="theme_name"
                  name="theme[name]"
                  placeholder="Technische Universität Berlin"
                  value="{% if form_data and form_data.theme_name %}{{ form_data.theme_name }}{% endif %}"
                />
            </div>

            <label for="theme_icon" class="block text-xs font-medium text-gray-700 mb-1">Theme Icon</label>
            <div class="flex items-center space-x-3 mt-1">
              <!-- Linke Seite: Bildvorschau mit verbessertem Berlin-Blau-Hintergrund -->
              <div id="themeIconPreviewContainer" class="flex-none w-24 h-24 rounded-lg overflow-hidden border border-gray-200 shadow-sm hover:shadow-lg transition-all duration-300 relative cursor-pointer" 
                   style="background: linear-gradient(135deg, #{% if form_data and form_data.theme_bgColorCard %}{{ form_data.theme_bgColorCard }}{% else %}18206c{% endif %} 0%, #{% if form_data and form_data.theme_bgColorSectionTop %}{{ form_data.theme_bgColorSectionTop }}{% else %}304a9f{% endif %} 100%);">
                <img 
                  id="themeIconPreview" 
                  src="{% if form_data and form_data.theme_icon %}data:image/png;base64,{{ form_data.theme_icon }}{% else %}{{ url_for('static', filename='studentVC-logo-sora-cropped-darkmode.png') }}{% endif %}" 
                  alt="Vorschau" 
                  class="w-full h-full object-contain p-2"
                />
                <div class="absolute inset-0 bg-black bg-opacity-0 hover:bg-opacity-20 flex items-center justify-center transition-all duration-200">
                  <i class="fas fa-camera text-white opacity-0 hover:opacity-100 transition-opacity duration-200 text-shadow-sm text-xs"></i>
                </div>
              </div>
              
              <!-- Mittlere Spalte: Upload-Box mit besserem Hover-Effekt -->
              <div class="flex-grow">
                <div id="themeDropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-3 flex items-center justify-center bg-gray-50 relative hover:bg-blue-50 hover:border-berlin-blue transition-all duration-300 group form-element-height min-h-[3.5rem]">
                  <div class="flex flex-col items-center">
                    <i class="fas fa-cloud-upload-alt text-gray-400 group-hover:text-berlin-blue transition-colors text-sm"></i>
                    <span class="text-xs text-gray-500 group-hover:text-berlin-blue text-center mt-0.5 transition-colors">Logo hochladen<br class="hidden sm:block">oder ablegen</span>
                  </div>
                  <input
                    type="file"
                    class="form-control absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                    id="theme_icon"
                    name="theme[icon]"
                    accept="image/*"
                  />
                </div>
              </div>
              
              <!-- Rechte Spalte: Reset Button mit besserem Hover-Effekt -->
              <button 
                type="button" 
                id="resetThemeIconBtn"
                class="flex-none w-10 h-10 flex items-center justify-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-500 hover:text-gray-700 transition-all duration-200 shadow-sm hover:shadow-md border border-gray-200" 
                title="Zurücksetzen"
                onclick="document.querySelector('input[name=default_logo]').value='studentVC-logo-sora-cropped-darkmode.png'"
              >
                <i class="fas fa-undo text-xs"></i>
              </button>
            </div>

            <!-- Farben mit verbessertem visuellem Feedback -->
            <div class="grid grid-cols-2 gap-3 mt-2">
              <div>
                <label for="bg_color_card" class="block text-xs font-medium text-gray-700 mb-1">BG Color (Card)</label>
                <div class="relative flex items-center">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
                  <input
                    type="text"
                    class="form-control w-full border border-gray-300 px-2 py-1.5 pl-6 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
                    id="bg_color_card"
                    name="theme[bgColorCard]"
                    placeholder="18206C"
                    value="{% if form_data and form_data.theme_bgColorCard %}{{ form_data.theme_bgColorCard }}{% else %}18206C{% endif %}"
                    onchange="this.nextElementSibling.style.backgroundColor = '#' + this.value"
                  />
                  <div class="w-5 h-5 rounded-full ml-2 border border-gray-200 shadow-sm" 
                       style="background-color: #{% if form_data and form_data.theme_bgColorCard %}{{ form_data.theme_bgColorCard }}{% else %}18206C{% endif %}" 
                       title="Vorschau"></div>
                </div>
              </div>
              
              <div>
                <label for="bg_color_section_top" class="block text-xs font-medium text-gray-700 mb-1">BG Color (Top)</label>
                <div class="relative flex items-center">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
                  <input
                    type="text"
                    class="form-control w-full border border-gray-300 px-2 py-1.5 pl-6 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
                    id="bg_color_section_top"
                    name="theme[bgColorSectionTop]"
                    placeholder="18206C"
                    value="{% if form_data and form_data.theme_bgColorSectionTop %}{{ form_data.theme_bgColorSectionTop }}{% else %}18206C{% endif %}"
                    onchange="this.nextElementSibling.style.backgroundColor = '#' + this.value"
                  />
                  <div class="w-5 h-5 rounded-full ml-2 border border-gray-200 shadow-sm" 
                       style="background-color: #{% if form_data and form_data.theme_bgColorSectionTop %}{{ form_data.theme_bgColorSectionTop }}{% else %}18206C{% endif %}" 
                       title="Vorschau"></div>
                </div>
              </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-1">
              <div>
                <label for="bg_color_section_bot" class="block text-xs font-medium text-gray-700 mb-1">BG Color (Bottom)</label>
                <div class="relative flex items-center">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
                  <input
                    type="text"
                    class="form-control w-full border border-gray-300 px-2 py-1.5 pl-6 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
                    id="bg_color_section_bot"
                    name="theme[bgColorSectionBot]"
                    placeholder="FFFFFF"
                    value="{% if form_data and form_data.theme_bgColorSectionBot %}{{ form_data.theme_bgColorSectionBot }}{% else %}FFFFFF{% endif %}"
                    onchange="this.nextElementSibling.style.backgroundColor = '#' + this.value"
                  />
                  <div class="w-5 h-5 rounded-full ml-2 border border-gray-200 shadow-sm" 
                       style="background-color: #{% if form_data and form_data.theme_bgColorSectionBot %}{{ form_data.theme_bgColorSectionBot }}{% else %}FFFFFF{% endif %}" 
                       title="Vorschau"></div>
                </div>
              </div>
              
              <div>
                <label for="fg_color_title" class="block text-xs font-medium text-gray-700 mb-1">FG Color (Title)</label>
                <div class="relative flex items-center">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-400 text-xs">#</span>
                  <input
                    type="text"
                    class="form-control w-full border border-gray-300 px-2 py-1.5 pl-6 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-berlin-blue focus:border-transparent form-element-height transition-all duration-200"
                    id="fg_color_title"
                    name="theme[fgColorTitle]"
                    placeholder="FFFFFF"
                    value="{% if form_data and form_data.theme_fgColorTitle %}{{ form_data.theme_fgColorTitle }}{% else %}FFFFFF{% endif %}"
                    onchange="this.nextElementSibling.style.backgroundColor = '#' + this.value"
                  />
                  <div class="w-5 h-5 rounded-full ml-2 border border-gray-200 shadow-sm" 
                       style="background-color: #{% if form_data and form_data.theme_fgColorTitle %}{{ form_data.theme_fgColorTitle }}{% else %}FFFFFF{% endif %}" 
                       title="Vorschau"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </details>
    </form>
  </div>
</div>
