{% extends "base.html" %}
{% block title %}Alpine.js Test | StudentVC{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md mb-8 p-6">
    <h1 class="text-2xl font-semibold text-gray-900 dark:text-white mb-4">Alpine.js Test</h1>
    
    <div x-data="{ count: 0, name: 'Test User' }">
      <p class="mb-4">Hello, <span x-text="name"></span>!</p>
      
      <div class="flex items-center mb-4">
        <button 
          @click="count++"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 mr-2">
          Increment
        </button>
        <span class="text-lg font-medium" x-text="count"></span>
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Change name:</label>
        <input 
          type="text" 
          x-model="name"
          class="px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
      </div>
      
      <div 
        x-show="count > 5"
        x-transition
        class="p-4 bg-green-100 text-green-800 rounded-md">
        Count is greater than 5!
      </div>
    </div>
  </div>
</div>
{% endblock %}
