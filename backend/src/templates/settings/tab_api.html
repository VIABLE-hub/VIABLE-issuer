<!-- API Tab – compact one-pager -->
<div class="h-full flex flex-col gap-3">

  <!-- ══════════════════════════════════════════════════════════════════
       ROW 1 (flex-1): API Keys (left)  +  QR Generator (right)
       ══════════════════════════════════════════════════════════════════ -->
  <div class="flex gap-3 flex-1 min-h-0">

    <!-- ── LEFT: API Key Management ─────────────────────────────────── -->
    <div class="flex-1 settings-panel p-3 flex flex-col min-w-0 overflow-hidden">
      <div class="flex items-center justify-between mb-2 flex-shrink-0">
        <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide">API Keys</h4>
        <span class="text-xs text-gray-400" x-text="apiKeys.length + ' Key(s)'"></span>
      </div>

      <!-- Table (scrollable) -->
      <div class="flex-1 overflow-y-auto min-h-0 mb-2">
        <div x-show="apiKeysLoading" class="flex justify-center py-4">
          <svg class="animate-spin h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </div>
        <div x-show="!apiKeysLoading && apiKeys.length === 0" class="text-center py-6 text-xs text-gray-400">
          Noch keine API Keys vorhanden.
        </div>
        <table x-show="!apiKeysLoading && apiKeys.length > 0" class="w-full text-xs">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left py-1 pr-2 font-medium text-gray-500">Name</th>
              <th class="text-left py-1 pr-2 font-medium text-gray-500 hidden sm:table-cell">Key</th>
              <th class="text-left py-1 pr-2 font-medium text-gray-500 hidden md:table-cell">Scope</th>
              <th class="text-left py-1 pr-2 font-medium text-gray-500 hidden md:table-cell">Nutzungen</th>
              <th class="text-center py-1 font-medium text-gray-500">Status</th>
              <th class="text-center py-1 font-medium text-gray-500"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="key in apiKeys" :key="key.id">
              <tr class="border-b border-gray-50 hover:bg-gray-50/50">
                <td class="py-1.5 pr-2 font-medium text-gray-800" x-text="key.name"></td>
                <td class="py-1.5 pr-2 font-mono text-gray-500 hidden sm:table-cell">
                  <div class="flex items-center gap-1">
                    <span x-text="key.masked_key"></span>
                    <button x-show="key.key" @click="copyToClipboard(key.key)" title="Kopieren"
                            class="text-gray-400 hover:text-gray-600">
                      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2"/>
                      </svg>
                    </button>
                  </div>
                </td>
                <td class="py-1.5 pr-2 hidden md:table-cell">
                  <template x-for="sc in (key.scopes || [])" :key="sc">
                    <span class="inline-block mr-0.5 mb-0.5 px-1 py-0 rounded text-[10px] bg-blue-50 text-blue-700" x-text="sc"></span>
                  </template>
                </td>
                <td class="py-1.5 pr-2 text-gray-500 hidden md:table-cell" x-text="key.usage_count || 0"></td>
                <td class="py-1.5 text-center">
                  <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-medium"
                        :class="key.is_active ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-600'">
                    <span class="w-1.5 h-1.5 rounded-full" :class="key.is_active ? 'bg-green-500' : 'bg-red-400'"></span>
                    <span x-text="key.is_active ? 'Aktiv' : 'Widerrufen'"></span>
                  </span>
                </td>
                <td class="py-1.5 text-center">
                  <button x-show="key.is_active"
                          @click="revokeApiKey(key.id)"
                          :disabled="keyRevoking"
                          title="Widerrufen"
                          class="text-red-400 hover:text-red-600 disabled:opacity-30">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                    </svg>
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>

      <!-- Generate form (flex-shrink-0 → always visible) -->
      <div class="border-t border-gray-100 pt-2 flex-shrink-0">
        <p class="text-xs font-medium text-gray-600 mb-1.5">Neuen Key erstellen</p>
        <form @submit.prevent="generateNewApiKey()" class="space-y-1.5">
          <input type="text" x-model="newKeyName" required placeholder="Name, z. B. HIS-Integration"
                 class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          <input type="text" x-model="newKeyDescription" placeholder="Beschreibung (optional)"
                 class="w-full text-xs border border-gray-200 rounded px-2 py-1.5 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          <div class="flex gap-2">
            <select x-model="newKeyScope"
                    class="flex-1 text-xs border border-gray-200 rounded px-2 py-1.5 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none bg-white">
              <option value="issuer">Issuer (Ausstellen)</option>
              <option value="verifier">Verifier (Prüfen)</option>
              <option value="admin">Admin (Alles)</option>
            </select>
            <button type="submit" :disabled="apiKeyGenerating"
                    class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium rounded bg-[#F0D722] text-gray-900 hover:bg-yellow-300 transition-colors disabled:opacity-50">
              <svg x-show="apiKeyGenerating" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              <span x-text="apiKeyGenerating ? '…' : 'Generieren'"></span>
            </button>
          </div>
        </form>

        <!-- New key reveal banner -->
        <div x-show="newApiKey" x-transition
             class="mt-2 p-2 rounded-lg bg-yellow-50 border border-yellow-200">
          <p class="text-[10px] text-yellow-700 font-medium mb-1">⚠ Nur jetzt sichtbar – jetzt kopieren!</p>
          <div class="flex items-center gap-1">
            <input type="text" readonly :value="newApiKey" id="new-api-key-field"
                   class="flex-1 text-xs font-mono bg-white border border-yellow-200 rounded px-2 py-1 text-gray-800 focus:outline-none">
            <button @click="copyToClipboard(newApiKey)"
                    class="px-2 py-1 text-[10px] rounded bg-yellow-200 hover:bg-yellow-300 text-yellow-900 font-medium whitespace-nowrap">Kopieren</button>
            <button @click="newApiKey = null" class="text-gray-400 hover:text-gray-600 ml-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Auth hint -->
        <p class="mt-1.5 text-[10px] text-gray-400">
          Header: <code class="bg-gray-100 px-1 rounded">Authorization: Bearer stvc_xxx</code>
        </p>
      </div>
    </div>

    <!-- ── RIGHT: QR Code Generator ──────────────────────────────────── -->
    <div class="w-80 flex-shrink-0 settings-panel p-3 flex flex-col min-h-0 overflow-hidden"
         x-data="qrGenerator()" x-init="init()">
      <h4 class="text-xs font-semibold text-gray-700 uppercase tracking-wide mb-2 flex-shrink-0">QR-Code Generator</h4>

      <!-- Tab switch -->
      <div class="flex gap-1 mb-2 flex-shrink-0">
        <button @click="qrTab = 'issuance'"
                :class="qrTab === 'issuance' ? 'bg-[#F0D722] text-gray-900 font-semibold' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="flex-1 text-xs py-1 rounded transition-colors">Ausstellen</button>
        <button @click="qrTab = 'verification'"
                :class="qrTab === 'verification' ? 'bg-blue-600 text-white font-semibold' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                class="flex-1 text-xs py-1 rounded transition-colors">Verifizieren</button>
      </div>

      <!-- Issuance Form -->
      <div x-show="qrTab === 'issuance'" class="flex flex-col flex-1 min-h-0 overflow-y-auto gap-1.5">
        <div class="grid grid-cols-2 gap-1.5">
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">MitarbeiterID *</label>
            <input type="text" x-model="issuance.mitarbeiterId" placeholder="BVG-12345" required
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">Vorname *</label>
            <input type="text" x-model="issuance.firstName" placeholder="Max" required
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">Nachname *</label>
            <input type="text" x-model="issuance.lastName" placeholder="Mustermann" required
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">Abteilung</label>
            <input type="text" x-model="issuance.department" placeholder="Fahrbetrieb"
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">Rolle</label>
            <input type="text" x-model="issuance.role" placeholder="Busfahrer"
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
          <div>
            <label class="block text-[10px] text-gray-500 mb-0.5">Gültigkeit (s)</label>
            <input type="number" x-model="issuance.validity_seconds" min="30" max="86400"
                   class="w-full text-xs border border-gray-200 rounded px-2 py-1 focus:ring-[#F0D722] focus:border-[#F0D722] outline-none">
          </div>
        </div>

        <button @click="generateIssuanceQR()" :disabled="issuance.loading"
                class="w-full py-1.5 text-xs font-medium rounded bg-[#F0D722] text-gray-900 hover:bg-yellow-300 transition-colors disabled:opacity-50 flex items-center justify-center gap-1">
          <svg x-show="issuance.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span x-text="issuance.loading ? 'Generiere…' : 'QR generieren'"></span>
        </button>

        <p x-show="issuance.error" x-text="issuance.error" class="text-[10px] text-red-500"></p>

        <!-- QR Result -->
        <div x-show="issuance.qrData" x-transition class="flex flex-col items-center gap-1 mt-1">
          <div class="p-2 bg-white rounded-lg border border-gray-200 shadow-sm">
            <img :src="'data:image/png;base64,' + issuance.qrData" alt="Issuance QR" class="w-32 h-32">
          </div>
          <p class="text-[10px] text-gray-400">Gültig bis: <span class="font-medium text-gray-600" x-text="issuance.expiresAt ? new Date(issuance.expiresAt).toLocaleTimeString('de-DE') : '–'"></span></p>
          <div class="flex gap-1">
            <button @click="downloadQR('issuance')" class="text-[10px] px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200">⬇ Download</button>
            <button @click="copyOfferUrl()" class="text-[10px] px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200">📋 URL</button>
          </div>
        </div>
      </div>

      <!-- Verification Form -->
      <div x-show="qrTab === 'verification'" class="flex flex-col flex-1 min-h-0 gap-1.5">
        <div>
          <label class="block text-[10px] text-gray-500 mb-0.5">Verifizierer-Domain</label>
          <input type="text" x-model="verification.domain" placeholder="gv.viable-project.de"
                 class="w-full text-xs font-mono border border-gray-200 rounded px-2 py-1 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <p class="text-[10px] text-gray-400 mt-0.5">Nur <code>*.viable-project.de</code> oder localhost</p>
        </div>

        <button @click="generateVerificationQR()" :disabled="verification.loading"
                class="w-full py-1.5 text-xs font-medium rounded bg-blue-600 text-white hover:bg-blue-700 transition-colors disabled:opacity-50 flex items-center justify-center gap-1">
          <svg x-show="verification.loading" class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span x-text="verification.loading ? 'Generiere…' : 'QR generieren'"></span>
        </button>

        <p x-show="verification.error" x-text="verification.error" class="text-[10px] text-red-500"></p>

        <div x-show="verification.qrData" x-transition class="flex flex-col items-center gap-1">
          <div class="p-2 bg-white rounded-lg border border-gray-200 shadow-sm">
            <img :src="'data:image/png;base64,' + verification.qrData" alt="Verification QR" class="w-32 h-32">
          </div>
          <a :href="verification.url" target="_blank" class="text-[10px] text-blue-600 underline font-mono truncate max-w-full" x-text="verification.url"></a>
          <div class="flex gap-1">
            <button @click="downloadQR('verification')" class="text-[10px] px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200">⬇ Download</button>
            <button @click="copyVerificationUrl()" class="text-[10px] px-2 py-0.5 rounded bg-gray-100 hover:bg-gray-200">📋 URL</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════
       ROW 2: Swagger UI (collapsible, fixed height)
       ══════════════════════════════════════════════════════════════════ -->
  <div class="settings-panel flex-shrink-0" x-data="{ swaggerOpen: false }">
    <button @click="swaggerOpen = !swaggerOpen; if(swaggerOpen && !window._swaggerInitialized) initSwagger()"
            class="w-full flex items-center justify-between px-3 py-2 text-xs font-semibold text-gray-700 hover:bg-white/40 transition-colors rounded-t-lg">
      <span class="flex items-center gap-2">
        <svg class="w-3.5 h-3.5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Swagger UI – API Tester
        <span class="text-[10px] text-gray-400 font-normal">(Bearer-Token aus API Keys eintragen)</span>
      </span>
      <svg class="w-4 h-4 transition-transform" :class="swaggerOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
    <div x-show="swaggerOpen" x-transition class="border-t border-gray-100" style="height: 420px; overflow-y: auto;">
      <div id="swagger-ui" class="text-xs"></div>
    </div>
  </div>

</div>

<!-- Swagger CSS + JS -->
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css">
<script>
window._swaggerInitialized = false;
function initSwagger() {
  if (window._swaggerInitialized) return;
  window._swaggerInitialized = true;
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js';
  script.onload = function() {
    SwaggerUIBundle({
      url:          '/api/openapi.json',
      dom_id:       '#swagger-ui',
      presets:      [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout:       'BaseLayout',
      deepLinking:  true,
      tryItOutEnabled: true,
      requestInterceptor: (req) => {
        // auto-inject API key from the list if available
        return req;
      },
    });
  };
  document.head.appendChild(script);
}
</script>

<script>
function qrGenerator() {
  return {
    qrTab: 'issuance',
    issuance: {
      mitarbeiterId: '',
      firstName: '',
      lastName: '',
      department: '',
      role: '',
      validity_seconds: 120,
      loading: false,
      qrData: null,
      expiresAt: null,
      offerUrl: null,
      error: null,
    },
    verification: {
      domain: 'gv.viable-project.de',
      loading: false,
      qrData: null,
      url: null,
      error: null,
    },

    init() {},

    async generateIssuanceQR() {
      this.issuance.loading = true;
      this.issuance.error = null;
      this.issuance.qrData = null;
      try {
        const resp = await fetch('/api/v1/qr/issuance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mitarbeiterId:    this.issuance.mitarbeiterId,
            firstName:        this.issuance.firstName,
            lastName:         this.issuance.lastName,
            department:       this.issuance.department || undefined,
            role:             this.issuance.role || undefined,
            validity_seconds: parseInt(this.issuance.validity_seconds) || 120,
          }),
        });
        const data = await resp.json();
        if (!resp.ok) { this.issuance.error = data.error || `Fehler ${resp.status}`; return; }
        this.issuance.qrData    = data.qr_code?.data ?? null;
        this.issuance.expiresAt = data.expires_at ?? null;
        this.issuance.offerUrl  = data.offer_url ?? null;
      } catch (e) {
        this.issuance.error = e.message;
      } finally {
        this.issuance.loading = false;
      }
    },

    async generateVerificationQR() {
      this.verification.loading = true;
      this.verification.error = null;
      this.verification.qrData = null;
      try {
        const resp = await fetch('/api/v1/qr/verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ verifier_domain: this.verification.domain }),
        });
        const data = await resp.json();
        if (!resp.ok) { this.verification.error = data.error || `Fehler ${resp.status}`; return; }
        this.verification.qrData = data.qr_code?.data ?? null;
        this.verification.url    = data.verification_url ?? null;
      } catch (e) {
        this.verification.error = e.message;
      } finally {
        this.verification.loading = false;
      }
    },

    downloadQR(type) {
      const d = type === 'issuance' ? this.issuance.qrData : this.verification.qrData;
      if (!d) return;
      const a = document.createElement('a');
      a.href = 'data:image/png;base64,' + d;
      a.download = `bvg-qr-${type}-${Date.now()}.png`;
      a.click();
    },
    copyOfferUrl() { if (this.issuance.offerUrl) navigator.clipboard.writeText(this.issuance.offerUrl).catch(() => {}); },
    copyVerificationUrl() { if (this.verification.url) navigator.clipboard.writeText(this.verification.url).catch(() => {}); },
  };
}
</script>
