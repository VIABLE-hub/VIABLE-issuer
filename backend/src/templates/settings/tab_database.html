<!-- Database Management Tab -->
<div class="space-y-6">
  <!-- Database Information Section -->
  <div class="mb-6 p-4 bg-white rounded-lg shadow-sm dark:bg-gray-800">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center justify-between">
      <div class="flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path>
      </svg>
        Database Information
      </div>
      <button @click="loadDatabase()" class="text-sm flex items-center gap-1 text-berlin-blue hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        <span>Refresh</span>
      </button>
    </h3>
    
    <!-- Loading indicator -->
    <template x-if="loadingDatabase === true">
      <div class="flex items-center justify-center h-24">
        <svg class="animate-spin h-8 w-8 text-berlin-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="ml-2 text-gray-600 dark:text-gray-300">Loading database information...</span>
      </div>
    </template>
    
    <!-- Database details -->
    <template x-if="loadingDatabase === false && databaseData">
      <div>
        <!-- Database Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
          <!-- Engine -->
          <div class="p-3 bg-gray-100 rounded-lg dark:bg-gray-700">
            <div class="text-sm text-gray-500 dark:text-gray-400">Database Engine</div>
            <div class="text-lg font-semibold text-gray-800 dark:text-white" x-text="databaseData?.engine || 'SQLite'"></div>
          </div>
          
          <!-- Size -->
          <div class="p-3 bg-gray-100 rounded-lg dark:bg-gray-700">
            <div class="text-sm text-gray-500 dark:text-gray-400">Database Size</div>
            <div class="text-lg font-semibold text-gray-800 dark:text-white" x-text="typeof databaseData.size === 'object' ? (databaseData.size?.formatted || '0 MB') : databaseData.size || '0 MB'"></div>
          </div>
          
          <!-- Tables -->
          <div class="p-3 bg-gray-100 rounded-lg dark:bg-gray-700">
            <div class="text-sm text-gray-500 dark:text-gray-400">Tables</div>
            <div class="text-lg font-semibold text-gray-800 dark:text-white" x-text="typeof databaseData.tables === 'object' ? (databaseData.tables?.count || 0) : (databaseData?.table_count || 0)"></div>
          </div>
          
          <!-- Records -->
          <div class="p-3 bg-gray-100 rounded-lg dark:bg-gray-700">
            <div class="text-sm text-gray-500 dark:text-gray-400">Credentials</div>
            <div class="text-lg font-semibold text-gray-800 dark:text-white" x-text="typeof databaseData.credentials === 'object' ? (databaseData.credentials?.total_issued || 0) : (databaseData?.credential_count || 0)"></div>
          </div>
        </div>
        
        <!-- Database actions -->
        <div class="flex flex-wrap gap-2">
          <button @click="createBackup" :disabled="backupInProgress" class="flex items-center gap-2 px-3 py-2 bg-berlin-blue text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
            </svg>
            <span x-text="backupInProgress ? 'Creating...' : 'Create Backup'"></span>
          </button>
          
          <button @click="exportDatabaseSQL" class="flex items-center gap-2 px-3 py-2 bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-white rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
            <span>Export SQL</span>
          </button>
        </div>
      </div>
    </template>
        </div>
        
  <!-- Database Backups Section -->
  <div class="mb-6 p-4 bg-white rounded-lg shadow-sm dark:bg-gray-800">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center justify-between">
      <div class="flex items-center">
        <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
        </svg>
        Database Backups
      </div>
      <button @click="loadBackupList" class="text-sm flex items-center gap-1 text-berlin-blue hover:text-blue-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        <span>Refresh</span>
      </button>
            </h3>
    
    <!-- Loading indicator for backups -->
    <template x-if="backupListLoading === true">
      <div class="flex items-center justify-center h-24">
        <svg class="animate-spin h-8 w-8 text-berlin-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="ml-2 text-gray-600 dark:text-gray-300">Loading backups...</span>
      </div>
    </template>
    
    <!-- No backups message -->
    <template x-if="backupListLoading === false && (!backupList || backupList.length === 0)">
      <div class="text-center py-8 text-gray-500 dark:text-gray-400">
        <svg class="mx-auto h-12 w-12 text-gray-400 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
        </svg>
        <p class="mt-2">No backups found</p>
        <button @click="createBackup" class="mt-3 px-4 py-2 bg-berlin-blue text-white rounded-lg hover:bg-blue-700 transition-colors">Create First Backup</button>
          </div>
    </template>
    
    <!-- Backup list -->
    <template x-if="backupListLoading === false && backupList && backupList.length > 0">
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
              <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
              <th scope="col" class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-300">Filename</th>
              <th scope="col" class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-300">Date</th>
              <th scope="col" class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-300">Size</th>
              <th scope="col" class="px-3 py-2 text-right text-xs font-medium text-gray-500 uppercase tracking-wider dark:text-gray-300">Actions</th>
                </tr>
              </thead>
          <tbody class="bg-white divide-y divide-gray-200 dark:bg-gray-800 dark:divide-gray-700">
            <template x-for="backup in backupList" :key="backup.id">
              <tr>
                <td class="px-3 py-2 whitespace-nowrap text-sm text-gray-800 dark:text-gray-200" x-text="backup.filename"></td>
                <td class="px-3 py-2 whitespace-nowrap text-sm text-gray-800 dark:text-gray-200" x-text="backup.date"></td>
                <td class="px-3 py-2 whitespace-nowrap text-sm text-gray-800 dark:text-gray-200" x-text="backup.size"></td>
                <td class="px-3 py-2 whitespace-nowrap text-right text-sm font-medium">
                  <div class="flex justify-end gap-2">
                    <button @click="downloadBackup(backup)" class="bg-berlin-blue text-white p-1 rounded hover:bg-blue-700" title="Download">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                      </svg>
                    </button>
                    <button @click="restoreBackup(backup)" class="bg-green-600 text-white p-1 rounded hover:bg-green-700" title="Restore">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                      </svg>
                    </button>
                    <button @click="deleteBackup(backup)" class="bg-red-600 text-white p-1 rounded hover:bg-red-700" title="Delete">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                      </svg>
                    </button>
                  </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
      </div>
    </template>
  </div>
  
  <!-- Import Database Section -->
  <div class="p-4 bg-white rounded-lg shadow-sm dark:bg-gray-800">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
      </svg>
      Import Database
    </h3>
    
    <div class="mt-3">
      <label for="sql-import" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
        Import SQL File
      </label>
      <div class="flex items-center">
        <input type="file" id="sql-import" @change="handleDatabaseFileSelect" class="hidden" accept=".sql,.db,.sqlite,.backup"/>
        <label for="sql-import" class="flex items-center gap-2 px-3 py-2 bg-berlin-blue text-white rounded-lg hover:bg-blue-700 transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          Choose File
        </label>
        <span x-text="selectedImportFile ? selectedImportFile.name : 'No file selected'" class="ml-3 text-sm text-gray-600 dark:text-gray-400"></span>
        <template x-if="selectedImportFile">
          <button @click="clearImportFile" class="ml-2 text-red-600 hover:text-red-700 dark:hover:text-red-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </template>
      </div>
      
      <div class="mt-3">
        <button @click="importDatabaseSQL" :disabled="!selectedImportFile || databaseImporting" class="flex items-center gap-2 px-4 py-2 bg-berlin-blue text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          <template x-if="!databaseImporting">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
          </template>
          <template x-if="databaseImporting">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          </template>
          <span x-text="databaseImporting ? 'Importing...' : 'Import Database'"></span>
        </button>
        </div>
      
      <!-- Import Progress -->
      <template x-if="databaseImporting && databaseImportProgress > 0">
        <div class="mt-3">
          <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700">
            <div class="bg-berlin-blue h-2.5 rounded-full" :style="`width: ${databaseImportProgress}%`"></div>
        </div>
          <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">
            <span x-text="`${databaseImportProgress.toFixed(1)}% complete`"></span>
              </div>
            </div>
          </template>
      </div>
    </div>
</div>
