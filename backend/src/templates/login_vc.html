<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In – BVG</title>
    
    <!-- TailwindCSS Production Build -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: url("/static/background.webp");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .page-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 26rem;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 1.25rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18), inset 0 0 0 1px rgba(255,255,255,0.6);
            overflow: hidden;
        }

        .card-header {
            background: #F0D722;
            padding: 1.75rem 2rem 1.5rem;
            text-align: center;
        }

        .card-body {
            padding: 1.75rem 2rem 2rem;
        }

        .field-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.375rem;
        }

        .field-input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            background: #fffef5;
            color: #111827;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .field-input:focus {
            border-color: #F0D722;
            box-shadow: 0 0 0 3px rgba(240, 215, 34, 0.25);
        }

        .field-input[readonly] {
            background: #f9fafb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            background: #F0D722;
            color: #000000;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.9375rem;
            letter-spacing: 0.01em;
            border: none;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(240, 215, 34, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(240, 215, 34, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-bar {
            background: rgba(255,255,255,0.92);
            border-top: 1px solid rgba(0,0,0,0.08);
            padding: 0.625rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        @media (max-width: 480px) {
            .card-header, .card-body { padding-left: 1.25rem; padding-right: 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="page-center">
        <div class="login-card">

            <!-- Card Header: BVG Logo + Slogan -->
            <div class="card-header">
                <img src="{{ url_for('static', filename='BVG_Logo_07.2021.svg') }}"
                     alt="BVG"
                     style="height: 72px; width: auto; display: block; margin: 0 auto;">
                <p style="margin-top: 0.875rem; font-size: 0.9375rem; font-weight: 700; color: #000; letter-spacing: 0.02em; text-transform: uppercase;">
                    Wir lieben unsere Mitarbeiter !
                </p>
            </div>

            <!-- Card Body: Form -->
            <div class="card-body">

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div style="margin-bottom: 1.25rem;">
                            {% for category, message in messages %}
                                <div style="{% if category == 'error' %}background:#fef2f2;border:1px solid #fecaca;color:#991b1b;{% elif category == 'success' %}background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;{% else %}background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;{% endif %} padding:0.75rem;border-radius:0.5rem;font-size:0.875rem;margin-bottom:0.5rem;">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <form action="/login" method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                    <!-- Email -->
                    <div style="margin-bottom: 1rem;">
                        <label class="field-label">E-Mail-Adresse</label>
                        <input type="email" name="name" required autofocus
                               placeholder="name@bvg.de"
                               class="field-input" />
                        <p style="margin-top:0.3rem;font-size:0.6875rem;color:#9ca3af;">Bitte BVG-E-Mail-Adresse verwenden</p>
                    </div>

                    <!-- Password -->
                    <div style="margin-bottom: 1.5rem;">
                        <label class="field-label">Passwort</label>
                        <input type="password" name="password" required
                               placeholder="Passwort eingeben"
                               class="field-input" />
                    </div>

                    <button type="submit" class="btn-login">Anmelden</button>
                </form>

                <p style="margin-top:1.25rem;text-align:center;font-size:0.75rem;color:#9ca3af;">
                    Sitzung läuft nach 12 Stunden ab
                </p>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-bar">
        <a href="/">
            <img src="{{ url_for('static', filename='BVG_Logo_07.2021.svg') }}" alt="BVG Logo" style="height:1.5rem;width:auto;">
        </a>
        <div style="display:flex;align-items:center;gap:1rem;font-size:0.75rem;color:#6b7280;">
            <a href="/about" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#6b7280'">Über uns</a>
            <a href="#" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='#111'" onmouseout="this.style.color='#6b7280'">Impressum</a>
        </div>
    </footer>

</body>
</html>
