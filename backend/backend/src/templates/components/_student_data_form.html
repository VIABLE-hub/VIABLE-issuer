<!-- Student Data Form Component -->
<div class="bg-gray-50 rounded-xl border border-gray-300 shadow-md p-4">
  <h2 class="text-lg font-semibold mb-3 text-gray-800 flex items-center">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
    </svg>
    📝 Studierendendaten
  </h2>
  
  <div class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Vorname -->
      <div>
        <label for="firstName" class="block text-sm font-medium text-gray-700">Vorname</label>
        <input type="text" id="firstName" name="firstName" placeholder="{{ form_data.firstName if form_data.firstName else 'Max' }}" 
               value="{{ form_data.firstName if form_data and form_data.firstName else '' }}"
               class="mt-1 focus:ring-berlin-blue focus:border-berlin-blue block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
      </div>
      <!-- Nachname -->
      <div>
        <label for="lastName" class="block text-sm font-medium text-gray-700">Nachname</label>
        <input type="text" id="lastName" name="lastName" placeholder="{{ form_data.lastName if form_data.lastName else 'Mustermann' }}" 
               value="{{ form_data.lastName if form_data and form_data.lastName else '' }}"
               class="mt-1 focus:ring-berlin-blue focus:border-berlin-blue block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <!-- Matrikelnummer -->
      <div>
        <label for="studentId" class="block text-sm font-medium text-gray-700">Matrikelnummer</label>
        <input type="text" id="studentId" name="studentId" placeholder="{{ form_data.studentId if form_data.studentId else '123456' }}" 
               value="{{ form_data.studentId if form_data and form_data.studentId else '' }}"
               class="mt-1 focus:ring-berlin-blue focus:border-berlin-blue block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
      </div>
      <!-- Matrikelnummer-Präfix -->
      <div>
        <label for="studentIdPrefix" class="block text-sm font-medium text-gray-700">Matrikelnummer-Präfix</label>
        <input type="text" id="studentIdPrefix" name="studentIdPrefix" placeholder="{{ form_data.studentIdPrefix if form_data.studentIdPrefix else '12345' }}" 
               value="{{ form_data.studentIdPrefix if form_data and form_data.studentIdPrefix else '' }}"
               class="mt-1 focus:ring-berlin-blue focus:border-berlin-blue block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
      </div>
    </div>

    <!-- Foto-Upload -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Studierendenfoto</label>
      <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-lg p-2 flex">
        <div id="imagePreviewContainer" class="w-32 h-32 relative bg-gray-100 rounded-lg overflow-hidden cursor-pointer flex items-center justify-center">
          <img id="imagePreview" src="{{ form_data.profileImage if form_data and form_data.profileImage else '/static/student.png' }}" 
               alt="Profilbild Vorschau" 
               class="w-full h-full object-cover"
               onerror="this.src='/static/student.png';">
        </div>
        <div class="ml-3 flex flex-col justify-between flex-grow">
          <div>
            <p class="text-sm text-gray-500">JPG oder PNG, max. 5 MB</p>
            <p class="text-xs text-gray-400 mt-1">Foto wird als Base64 im VC eingebettet</p>
            <label class="mt-2 inline-flex items-center px-3 py-1.5 border border-gray-300 shadow-sm text-sm leading-4 font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-berlin-blue cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
              </svg>
              Foto auswählen
              <input id="profileImage" name="profileImage" type="file" accept="image/jpeg, image/png" class="sr-only">
            </label>
          </div>
          <button id="resetImageBtn" type="button" 
                  class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded text-red-700 bg-red-100 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 self-end">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Zurücksetzen
          </button>
        </div>
      </div>
      <div data-has-profile-image="{{ 'true' if form_data and form_data.profileImage else 'false' }}" class="hidden"></div>
    </div>
  </div>
</div>
