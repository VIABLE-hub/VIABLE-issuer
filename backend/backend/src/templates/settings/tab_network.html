<!-- 🌐 Network Settings Tab -->
<div class="space-y-6">
  
  <!-- Connection Configuration Section -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
      </svg>
      Connection Configuration
    </h3>
    
    <!-- Connection Mode Selection -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">Connection Mode</label>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <!-- Local Network Card -->
        <div class="relative">
          <label class="cursor-pointer">
            <input type="radio" x-model="connectionMode" value="local" class="sr-only">
            <div class="p-4 border-2 rounded-lg transition-all duration-200 hover:shadow-md" 
                 :class="connectionMode === 'local' ? 'border-berlin-blue bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-gray-600 hover:border-gray-300 dark:hover:border-gray-500'">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center mr-3" 
                       :class="connectionMode === 'local' ? 'bg-berlin-blue text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m0 0V11a1 1 0 011-1h2a1 1 0 011 1v10m0 0h3a1 1 0 001-1V10M9 21h6"></path>
                    </svg>
                  </div>
                  <div>
                    <h4 class="font-medium text-gray-900 dark:text-white">Local Network</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400">WiFi devices only</p>
                  </div>
                </div>
                <div class="w-4 h-4 rounded-full border-2" 
                     :class="connectionMode === 'local' ? 'border-berlin-blue bg-berlin-blue' : 'border-gray-300 dark:border-gray-600'">
                  <div x-show="connectionMode === 'local'" class="w-2 h-2 rounded-full bg-white mx-auto mt-0.5"></div>
                </div>
              </div>
              <p class="text-xs text-gray-600 dark:text-gray-400 font-mono" x-text="networkData?.local_ip || '192.168.178.122'"></p>
            </div>
          </label>
        </div>

        <!-- Public Internet Card -->
        <div class="relative">
          <label class="cursor-pointer">
            <input type="radio" x-model="connectionMode" value="public" class="sr-only">
            <div class="p-4 border-2 rounded-lg transition-all duration-200 hover:shadow-md" 
                 :class="connectionMode === 'public' ? 'border-berlin-blue bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-gray-600 hover:border-gray-300 dark:hover:border-gray-500'">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center mr-3" 
                       :class="connectionMode === 'public' ? 'bg-berlin-blue text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9v-9m0-9v9"></path>
                    </svg>
                  </div>
                  <div>
                    <h4 class="font-medium text-gray-900 dark:text-white">Public Internet</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Direct IP access</p>
                  </div>
                </div>
                <div class="w-4 h-4 rounded-full border-2" 
                     :class="connectionMode === 'public' ? 'border-berlin-blue bg-berlin-blue' : 'border-gray-300 dark:border-gray-600'">
                  <div x-show="connectionMode === 'public'" class="w-2 h-2 rounded-full bg-white mx-auto mt-0.5"></div>
                </div>
              </div>
              <p class="text-xs text-gray-600 dark:text-gray-400 font-mono" x-text="networkData?.public_ip || '79.242.78.26'"></p>
            </div>
          </label>
        </div>

        <!-- NGROK Tunnel Card -->
        <div class="relative">
          <label class="cursor-pointer">
            <input type="radio" x-model="connectionMode" value="ngrok" class="sr-only">
            <div class="p-4 border-2 rounded-lg transition-all duration-200 hover:shadow-md" 
                 :class="connectionMode === 'ngrok' ? 'border-berlin-blue bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-gray-600 hover:border-gray-300 dark:hover:border-gray-500'">
              <div class="flex items-center justify-between mb-2">
                <div class="flex items-center">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center mr-3" 
                       :class="connectionMode === 'ngrok' ? 'bg-berlin-blue text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                  </div>
                  <div>
                    <h4 class="font-medium text-gray-900 dark:text-white">NGROK Tunnel</h4>
                    <p class="text-xs text-gray-500 dark:text-gray-400">Global access</p>
                  </div>
                </div>
                <div class="w-4 h-4 rounded-full border-2" 
                     :class="connectionMode === 'ngrok' ? 'border-berlin-blue bg-berlin-blue' : 'border-gray-300 dark:border-gray-600'">
                  <div x-show="connectionMode === 'ngrok'" class="w-2 h-2 rounded-full bg-white mx-auto mt-0.5"></div>
                </div>
              </div>
              <p class="text-xs text-gray-600 dark:text-gray-400 font-mono" x-text="ngrokDomain || 'Configure below'"></p>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- Port Configuration -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Server Port</label>
      <div class="flex items-center space-x-3">
        <input 
          type="number" 
          x-model="serverPort" 
          min="1000" 
          max="65535" 
          placeholder="8080" 
          class="w-24 rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
        >
        <span class="text-sm text-gray-500 dark:text-gray-400">Default: 8080</span>
      </div>
    </div>

    <!-- NGROK URL Configuration (shown when NGROK is selected) -->
    <template x-if="connectionMode === 'ngrok'">
      <div class="mb-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">NGROK Public URL</label>
        <div class="flex items-center space-x-2 mb-3">
          <input 
            type="url" 
            x-model="ngrokDomain" 
            placeholder="https://abc123.ngrok.io" 
            class="flex-1 rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:text-white sm:text-sm"
          >
          <button 
            @click="testNgrokConnection()" 
            :disabled="!ngrokDomain"
            class="px-3 py-2 text-sm bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-md hover:bg-gray-200 dark:hover:bg-gray-600 disabled:opacity-50 transition-colors"
          >
            Test
          </button>
        </div>
        <p class="text-xs text-gray-600 dark:text-gray-400">
          Start ngrok with: <code class="bg-yellow-100 dark:bg-yellow-800 px-1 rounded text-xs">ngrok http <span x-text="serverPort || '8080'"></span></code>
        </p>
      </div>
    </template>

    <!-- Action Buttons -->
    <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
      <button @click="loadNetworkSettings()" 
              :disabled="loadingNetwork"
              class="flex items-center gap-2 px-4 py-2 text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors disabled:opacity-50">
        <svg class="w-4 h-4" :class="{'animate-spin': loadingNetwork}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        <span x-text="loadingNetwork ? 'Refreshing...' : 'Refresh Data'"></span>
      </button>
      
      <div class="flex items-center space-x-2">
        <button @click="resetNetworkConfig()" 
                class="px-4 py-2 text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
          Reset
        </button>
        <button @click="saveNetworkConfig()" 
                :disabled="networkConfigUpdating"
                class="flex items-center gap-2 px-6 py-2 bg-berlin-blue text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50">
          <svg x-show="!networkConfigUpdating" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
          </svg>
          <svg x-show="networkConfigUpdating" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          <span x-text="networkConfigUpdating ? 'Applying...' : 'Apply Configuration'"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Current Network Info Display -->
  <div class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-700 dark:to-gray-600 rounded-lg p-4 border border-blue-200 dark:border-gray-600">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
      Current Network Status
    </h3>
    <template x-if="loadingNetwork === true">
      <div class="flex items-center justify-center h-16">
        <svg class="animate-spin h-6 w-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="ml-2 text-gray-600 dark:text-gray-400">Loading network information...</span>
      </div>
    </template>
    <template x-if="loadingNetwork === false">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Local IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.local_ip || 'Loading...'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Public IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.public_ip || 'Not available'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Hostname:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.hostname || 'Unknown'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Default Port:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.default_port || '8080'"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Current Network Status -->
  <div class="bg-gradient-to-r from-blue-50 to-indigo-50 dark:from-gray-700 dark:to-gray-600 rounded-lg p-4 border border-blue-200 dark:border-gray-600">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-3 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
      Current Network Status
    </h3>
    <template x-if="loadingNetwork === true">
      <div class="flex items-center justify-center h-16">
        <svg class="animate-spin h-6 w-6 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="ml-2 text-gray-600 dark:text-gray-400">Loading network information...</span>
      </div>
    </template>
    <template x-if="loadingNetwork === false">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Local IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.local_ip || 'Loading...'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Public IP:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.public_ip || 'Not available'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Hostname:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.hostname || 'Unknown'"></span>
        </div>
        <div>
          <span class="font-medium text-gray-700 dark:text-gray-300">Default Port:</span>
          <span class="ml-2 font-mono bg-white dark:bg-gray-800 px-2 py-1 rounded border" x-text="networkData?.default_port || '8080'"></span>
        </div>
      </div>
    </template>
  </div>

  <!-- Generated URLs Section -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
      </svg>
      Generated URLs
      <span class="ml-2 text-sm font-normal text-gray-500 dark:text-gray-400">
        (Based on <span x-text="connectionMode || 'local'"></span> connection)
      </span>
    </h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Issuer URL:</label>
        <div class="flex items-center space-x-2">
          <code class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm font-mono text-gray-900 dark:text-gray-100" x-text="getDynamicIssuerUrl()"></code>
          <button @click="copyToClipboard(getDynamicIssuerUrl())" class="p-2 text-gray-500 hover:text-blue-600 transition-colors border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Verifier URL:</label>
        <div class="flex items-center space-x-2">
          <code class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded px-3 py-2 text-sm font-mono text-gray-900 dark:text-gray-100" x-text="getDynamicVerifierUrl()"></code>
          <button @click="copyToClipboard(getDynamicVerifierUrl())" class="p-2 text-gray-500 hover:text-blue-600 transition-colors border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>



  <!-- Network Testing -->
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6">
    <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4 flex items-center">
      <svg class="w-5 h-5 mr-2 text-berlin-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      Network Diagnostics
    </h3>
    
    <div class="space-y-4">
      <!-- Enhanced Test Button with Intelligent Behavior -->
      <button @click="testSelectedConnection()" 
              :disabled="testingConnection || !canTestConnection()"
              :class="canTestConnection() ? 'bg-berlin-blue hover:bg-blue-700 text-white' : 'bg-gray-300 dark:bg-gray-600 text-gray-500 dark:text-gray-400 cursor-not-allowed'"
              class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-lg transition-colors disabled:opacity-50"
              :title="canTestConnection() ? 'Test the selected connection mode' : 'Cannot test this connection mode'">
        <svg class="w-5 h-5" :class="{'animate-spin': testingConnection}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <span x-text="testingConnection ? 'Testing Connection...' : getTestButtonText()"></span>
      </button>
      
      <!-- Info text for non-testable modes -->
      <template x-if="connectionMode === 'public'">
        <div class="text-sm text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg p-3 flex items-start gap-2">
          <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div>
            <strong>Public IP testing limitation:</strong> Cannot test public IP connectivity from the same machine. 
            To verify public access, use an external device or ask someone to test the URLs from a different network.
          </div>
        </div>
      </template>
      
      <template x-if="connectionMode === 'ngrok' && !ngrokDomain">
        <div class="text-sm text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-lg p-3 flex items-start gap-2">
          <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div>
            <strong>NGROK testing:</strong> Enter your NGROK URL above to enable connection testing.
            Run <code class="bg-blue-100 dark:bg-blue-800 px-1 rounded">ngrok http <span x-text="serverPort"></span></code> to get your tunnel URL.
          </div>
        </div>
      </template>
      
      <button @click="testConnectionFallback()" 
              :disabled="testingConnection"
              class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors disabled:opacity-50"
              title="Use simplified direct testing method that bypasses the API">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        <span>Use Fallback Test Method</span>
      </button>
      
      <template x-if="connectionTestResults && Object.keys(connectionTestResults).length > 0">
        <div class="mt-4 border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden">
          <div class="bg-gray-50 dark:bg-gray-800 px-4 py-3 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <h4 class="text-sm font-medium text-gray-700 dark:text-gray-300">Test Results</h4>
            <span class="text-sm" x-text="connectionTestResults.message || ''"></span>
          </div>
          <div class="divide-y divide-gray-200 dark:divide-gray-700">
            <div class="grid grid-cols-4 text-sm">
              <div class="py-3 px-4 font-medium text-gray-700 dark:text-gray-300">Component</div>
              <div class="py-3 px-4 font-medium text-gray-700 dark:text-gray-300">IP Address</div>
              <div class="py-3 px-4 font-medium text-gray-700 dark:text-gray-300">Status</div>
              <div class="py-3 px-4 font-medium text-gray-700 dark:text-gray-300">Latency</div>
            </div>
            
            <template x-if="connectionTestResults.components && connectionTestResults.components.issuer">
              <div class="grid grid-cols-4 text-sm">
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400">Issuer</div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.issuer.ip || '-'"></div>
                <div class="py-3 px-4">
                  <span x-text="connectionTestResults.components.issuer.success ? '✅' : '❌'" class="text-lg"></span>
                  <span x-if="!connectionTestResults.components.issuer.success" 
                        x-text="connectionTestResults.components.issuer.message" 
                        class="ml-2 text-xs text-red-600 dark:text-red-400"></span>
                </div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.issuer.latency ? connectionTestResults.components.issuer.latency + 'ms' : '-'"></div>
              </div>
            </template>
            
            <template x-if="connectionTestResults.components && connectionTestResults.components.verifier">
              <div class="grid grid-cols-4 text-sm">
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400">Verifier</div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.verifier.ip || '-'"></div>
                <div class="py-3 px-4">
                  <span x-text="connectionTestResults.components.verifier.success ? '✅' : '❌'" class="text-lg"></span>
                  <span x-if="!connectionTestResults.components.verifier.success" 
                        x-text="connectionTestResults.components.verifier.message" 
                        class="ml-2 text-xs text-red-600 dark:text-red-400"></span>
                </div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.verifier.latency ? connectionTestResults.components.verifier.latency + 'ms' : '-'"></div>
              </div>
            </template>
            
            <template x-if="connectionTestResults.components && connectionTestResults.components.sse">
              <div class="grid grid-cols-4 text-sm">
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400">SSE</div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.sse.ip || '-'"></div>
                <div class="py-3 px-4">
                  <span x-text="connectionTestResults.components.sse.success ? '✅' : '❌'" class="text-lg"></span>
                  <span x-if="!connectionTestResults.components.sse.success" 
                        x-text="connectionTestResults.components.sse.message" 
                        class="ml-2 text-xs text-red-600 dark:text-red-400"></span>
                </div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.sse.latency ? connectionTestResults.components.sse.latency + 'ms' : '-'"></div>
              </div>
            </template>
            
            <template x-if="connectionTestResults.components && connectionTestResults.components.websocket">
              <div class="grid grid-cols-4 text-sm">
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400">WebSocket</div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.websocket.ip || '-'"></div>
                <div class="py-3 px-4">
                  <span x-text="connectionTestResults.components.websocket.success ? '✅' : '❌'" class="text-lg"></span>
                  <span x-if="!connectionTestResults.components.websocket.success" 
                        x-text="connectionTestResults.components.websocket.message" 
                        class="ml-2 text-xs text-red-600 dark:text-red-400"></span>
                </div>
                <div class="py-3 px-4 text-gray-600 dark:text-gray-400" x-text="connectionTestResults.components.websocket.latency ? connectionTestResults.components.websocket.latency + 'ms' : '-'"></div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>
  
  <div class="flex justify-end">
    <button @click="saveNetworkConfig()" 
            :disabled="networkConfigUpdating"
            class="flex items-center gap-2 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50">
      <svg class="w-5 h-5" :class="{'animate-spin': networkConfigUpdating}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
      </svg>
      <span x-text="networkConfigUpdating ? 'Saving...' : 'Save Configuration'"></span>
    </button>
  </div>
</div>
