<!-- System Dashboard: CPU, RAM, Speicher -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
  <!-- System Status -->
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Systemstatus</h3>
      <span class="flex items-center px-2 py-1 rounded-full bg-green-100 dark:bg-green-900/30 text-green-800 dark:text-green-300 text-xs">
        <span class="h-2 w-2 rounded-full bg-green-500 mr-1.5"></span>
        Online
      </span>
    </div>
    
    <template x-if="systemData">
      <div>
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs text-gray-500 dark:text-gray-400">CPU-Auslastung:</span>
          <span class="text-xs font-semibold" :class="systemData.cpu?.usage > 80 ? 'text-red-600 dark:text-red-400' : 'text-gray-800 dark:text-gray-300'" x-text="`${systemData.cpu?.usage || 0}%`"></span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mb-4">
          <div class="h-1.5 rounded-full" :class="systemData.cpu?.usage > 80 ? 'bg-red-500' : 'bg-green-500'" :style="`width: ${systemData.cpu?.usage || 0}%`"></div>
        </div>
        
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs text-gray-500 dark:text-gray-400">RAM-Auslastung:</span>
          <span class="text-xs font-semibold" :class="systemData.memory?.usage > 80 ? 'text-red-600 dark:text-red-400' : 'text-gray-800 dark:text-gray-300'" x-text="`${systemData.memory?.usage || 0}%`"></span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mb-4">
          <div class="h-1.5 rounded-full" :class="systemData.memory?.usage > 80 ? 'bg-red-500' : 'bg-green-500'" :style="`width: ${systemData.memory?.usage || 0}%`"></div>
        </div>
        
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs text-gray-500 dark:text-gray-400">Festplattenspeicher:</span>
          <span class="text-xs font-semibold" :class="systemData.disk?.usage > 80 ? 'text-red-600 dark:text-red-400' : 'text-gray-800 dark:text-gray-300'" x-text="`${systemData.disk?.usage || 0}%`"></span>
        </div>
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5 mb-2">
          <div class="h-1.5 rounded-full" :class="systemData.disk?.usage > 80 ? 'bg-red-500' : 'bg-green-500'" :style="`width: ${systemData.disk?.usage || 0}%`"></div>
        </div>
        
        <div class="text-xs text-gray-500 dark:text-gray-400 mt-4">
          <span>Uptime: </span>
          <span class="font-mono text-gray-800 dark:text-gray-300" x-text="formatUptime(systemData.uptime?.app_uptime || 0)"></span>
        </div>
      </div>
    </template>
    
    <template x-if="!systemData">
      <div class="flex items-center justify-center h-32">
        <svg class="animate-spin h-6 w-6 text-berlin-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
    </template>
  </div>
  
  <!-- Database Status -->
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Datenbankstatus</h3>
      <span class="flex items-center px-2 py-1 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 text-xs">
        <span class="h-2 w-2 rounded-full bg-blue-500 mr-1.5"></span>
        Aktiv
      </span>
    </div>
    
    <template x-if="systemData?.database">
      <div>
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Credentials:</span>
          <span class="text-xs font-mono text-gray-800 dark:text-gray-300" x-text="systemData.database.credential_count || 0"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Datenbankgröße:</span>
          <span class="text-xs font-mono text-gray-800 dark:text-gray-300" x-text="formatBytes(systemData.database.size_bytes || 0)"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Status:</span>
          <span class="text-xs font-mono text-green-600 dark:text-green-400" x-text="systemData.database.status || 'Healthy'"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Backups:</span>
          <span class="text-xs font-mono text-gray-800 dark:text-gray-300" x-text="systemData.database.backup_count || 0"></span>
        </div>
        
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-500 dark:text-gray-400">Letztes Backup:</span>
          <span class="text-xs font-mono text-gray-800 dark:text-gray-300" x-text="systemData.database.last_backup || 'N/A'"></span>
        </div>
      </div>
    </template>
    
    <template x-if="!systemData?.database">
      <div class="flex items-center justify-center h-32">
        <svg class="animate-spin h-6 w-6 text-berlin-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
    </template>
  </div>
  
  <!-- Services Status -->
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 p-5">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-gray-900 dark:text-white">Service-Status</h3>
      <span class="flex items-center px-2 py-1 rounded-full bg-purple-100 dark:bg-purple-900/30 text-purple-800 dark:text-purple-300 text-xs">
        <span class="h-2 w-2 rounded-full bg-purple-500 mr-1.5"></span>
        Bereit
      </span>
    </div>
    
    <template x-if="systemData?.services">
      <div>
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Issuer:</span>
          <span class="text-xs font-mono" :class="systemData.services.issuer_status === 'online' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="systemData.services.issuer_status || 'unknown'"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Verifier:</span>
          <span class="text-xs font-mono" :class="systemData.services.verifier_status === 'online' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="systemData.services.verifier_status || 'unknown'"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">Network:</span>
          <span class="text-xs font-mono" :class="systemData.network?.status === 'online' ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'" x-text="systemData.network?.status || 'unknown'"></span>
        </div>
        
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500 dark:text-gray-400">API:</span>
          <span class="text-xs font-mono text-green-600 dark:text-green-400">online</span>
        </div>
        
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-500 dark:text-gray-400">Letzte Aktualisierung:</span>
          <span class="text-xs font-mono text-gray-800 dark:text-gray-300" x-text="lastUpdated"></span>
        </div>
      </div>
    </template>
    
    <template x-if="!systemData?.services">
      <div class="flex items-center justify-center h-32">
        <svg class="animate-spin h-6 w-6 text-berlin-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </div>
    </template>
  </div>
</div>
