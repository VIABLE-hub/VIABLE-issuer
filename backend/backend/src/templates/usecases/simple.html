{% extends "base.html" %}
{% block title %}Use Case Hub (Simplified) | StudentVC{% endblock %}
{% block content %}

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
  <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md mb-8 p-6">
    <div class="text-center mb-6">
      <h1 class="text-2xl md:text-3xl font-semibold text-gray-900 dark:text-white mb-2">Verifiable Credentials Use Case Hub</h1>
      <p class="text-base text-gray-700 dark:text-gray-300 max-w-2xl mx-auto">Wissenschaftliche Anwendungen von Zero-Knowledge-Beweisen und BBS+ Signaturen</p>
      <div class="w-24 h-1 bg-berlin-blue mx-auto mt-3 rounded-full"></div>
    </div>

    <!-- Simple Alpine.js Component -->
    <div x-data="{ 
      activeTab: 'health',
      tabs: {
        'health': {
          name: 'Gesundheitswesen',
          description: 'Datenschutzkonforme Zertifikate für medizinische Nachweise mit Zero-Knowledge Verifikation',
          icon: '🩺'
        },
        'education': {
          name: 'Bildung & Zertifikate',
          description: 'Fälschungssichere akademische Abschlüsse und Bildungsnachweise',
          icon: '🎓'
        },
        'kyc': {
          name: 'KYC & Identifikation',
          description: 'Rechtssichere Identitätsverifikation ohne unnötige Datenpreisgabe',
          icon: '👤'
        }
      }
    }">
      <!-- Tab Navigation -->
      <div class="flex space-x-4 mb-6 overflow-x-auto py-2">
        <template x-for="(tab, key) in tabs" :key="key">
          <button 
            @click="activeTab = key"
            :class="{'bg-blue-100 text-blue-800': activeTab === key, 'bg-gray-100 text-gray-800': activeTab !== key}"
            class="px-4 py-2 rounded-md flex items-center space-x-2 transition-colors">
            <span x-text="tab.icon"></span>
            <span x-text="tab.name"></span>
          </button>
        </template>
      </div>
      
      <!-- Tab Content -->
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6 border border-gray-100 dark:border-gray-700">
        <template x-for="(tab, key) in tabs" :key="key">
          <div x-show="activeTab === key" class="space-y-4">
            <h2 class="text-xl font-bold flex items-center">
              <span x-text="tab.icon" class="mr-2 text-2xl"></span>
              <span x-text="tab.name"></span>
            </h2>
            <p x-text="tab.description" class="text-gray-600 dark:text-gray-400"></p>
          </div>
        </template>
      </div>
    </div>
  </div>
</div>

{% endblock %}
