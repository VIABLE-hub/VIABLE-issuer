<!-- Gruppe 2: Signaturprüfung -->
<details class="border border-gray-200 rounded-lg shadow-sm bg-white hover:bg-gray-50">
  <summary class="p-4 cursor-pointer transition-all">
    <div class="flex items-center justify-between w-full">
      <div class="flex items-center gap-2">
        <div class="flex items-center justify-center w-8 h-8 bg-gray-100 rounded-full">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 0 1 17 21z" />
          </svg>
        </div>
        <div>
          <h3 class="text-sm font-semibold text-gray-900">Signaturprüfung</h3>
          <p class="text-xs text-gray-600">Kryptographische Verifikation der Daten</p>
        </div>
      </div>
      <div class="flex items-center">
        <span id="signature-status-icon" class="text-yellow-600">⏳</span>
        <span class="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-md ml-2 mr-2 font-medium">0/2</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </summary>

  <div class="p-4 space-y-4">
    <!-- Verifikationspunkt: Alle Felder vorhanden -->
    <div class="flex items-center justify-between border-b py-1.5">
      <div class="flex items-center gap-2">
        <span class="font-medium text-sm text-gray-800">Alle Felder vorhanden</span>
        <span title="Alle erforderlichen Datenfelder sind in der Präsentation enthalten." class="text-xs text-gray-500">?</span>
      </div>
      <span id="mandatory_fields_verification" class="text-sm font-mono">⏳</span>
    </div>

    <!-- Verifikationspunkt: BBS+ Schlüssel gültig -->
    <div class="flex items-center justify-between py-1.5">
      <div class="flex items-center gap-2">
        <span class="font-medium text-sm text-gray-800">BBS+ Schlüssel gültig</span>
        <span title="Der kryptografische Schlüssel des Issuers ist gültig." class="text-xs text-gray-500">?</span>
      </div>
      <span id="issuer_bbs_key_verification" class="text-sm font-mono">⏳</span>
    </div>
  </div>
</details>
