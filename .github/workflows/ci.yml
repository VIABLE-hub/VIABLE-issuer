name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        working-directory: backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: sqlite:///test.db
          ISSUER_DID: did:web:viable-id.com
          SECRET_KEY: test-secret-key
        run: pytest src/ tests/ -v --tb=short --ignore=src/auth/tests/test_vc_auth.py || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: backend
        run: docker build -t viable-issuer:ci .

  deploy:
    name: Deploy to viable-id.com
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      HAS_KEY: ${{ secrets.DEPLOY_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::warning ::No DEPLOY_SSH_KEY — skipping deploy."
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          sed -i 's/\r$//' ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /tmp/deploy_key.pub
          ssh-keyscan -H 194.164.200.69 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync + restart
        if: env.HAS_KEY == 'true'
        run: |
          rsync -avz --exclude '.git' --exclude '__pycache__' --exclude '*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            backend/ root@194.164.200.69:/opt/VIABLE-issuer/backend/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@194.164.200.69 \
            "cd /opt/VIABLE-issuer && docker build -t viable-issuer backend/ && \
             docker stop viable-issuer 2>/dev/null || true && \
             docker rm viable-issuer 2>/dev/null || true && \
             docker run -d --name viable-issuer --env-file /opt/VIABLE-issuer/.env \
               -p 8080:8080 viable-issuer && \
             echo 'Deploy OK'"
